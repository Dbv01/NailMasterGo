<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NailMasterGo — бронирование мастеров ногтевого сервиса</title>
    
    <!-- Фавиконка -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💅</text></svg>">
    
    <!-- Иконочный шрифт Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ============ СБРОС И ПЕРЕМЕННЫЕ ============ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B9D;
            --primary-dark: #E5507A;
            --secondary: #6C5CE7;
            --accent: #00CEC9;
            --light: #FFFFFF;
            --dark: #1A1A2E;
            --dark-card: rgba(26, 26, 46, 0.9);
            --gray: #A0A0B0;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --gradient: linear-gradient(135deg, #FF6B9D 0%, #6C5CE7 100%);
            --success: #00CEC9;
            --error: #FF7675;
            --warning: #FDCB6E;
            --radius: 16px;
            --radius-lg: 24px;
        }

        /* ============ БАЗОВЫЕ СТИЛИ ============ */
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #1A1A2E 0%, #16213E 100%);
            color: var(--light);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ============ АНИМАЦИИ ============ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 157, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(255, 107, 157, 0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============ СТРАНИЦЫ ============ */
        .page {
            display: none !important;
            padding-top: 80px;
            min-height: 100vh;
            animation: fadeIn 0.4s ease;
        }

        .page.active {
            display: block !important;
        }

        /* ============ НАВИГАЦИЯ ============ */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid var(--card-border);
            height: 70px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: -1px;
            user-select: none;
        }

        .logo span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
            align-items: center;
        }

        .nav-link {
            color: var(--gray);
            font-weight: 500;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 0.95rem;
            transition: 0.3s;
            position: relative;
            padding: 0.5rem 0;
            font-family: 'Inter', sans-serif;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient);
            transition: 0.3s;
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--primary);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--light);
            font-size: 1.8rem;
            cursor: pointer;
        }

        /* ============ ВЫПАДАЮЩЕЕ МЕНЮ ПОЛЬЗОВАТЕЛЯ ============ */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background: var(--dark-card);
            border-radius: 12px;
            padding: 8px;
            min-width: 200px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            z-index: 1001;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-menu button {
            display: block;
            width: 100%;
            padding: 10px 16px;
            background: none;
            border: none;
            color: var(--light);
            cursor: pointer;
            border-radius: 8px;
            text-align: left;
            font-size: 0.9rem;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .dropdown-menu button:hover {
            background: rgba(255, 107, 157, 0.15);
            color: var(--primary);
        }

        .dropdown-menu .logout-btn {
            color: var(--error);
        }

        .dropdown-menu .logout-btn:hover {
            background: rgba(255, 118, 117, 0.15);
        }

        /* ============ АДАПТИВНОСТЬ НАВИГАЦИИ ============ */
        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                top: 70px;
                left: 0;
                width: 100%;
                background: rgba(26, 26, 46, 0.98);
                flex-direction: column;
                padding: 2rem;
                transform: translateY(-100%);
                opacity: 0;
                visibility: hidden;
                transition: 0.3s;
                z-index: 999;
                gap: 1rem;
            }

            .nav-links.active {
                transform: translateY(0);
                opacity: 1;
                visibility: visible;
            }

            .mobile-menu-btn {
                display: block;
            }
        }

        /* ============ КНОПКИ ============ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--gradient);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 0.3px;
            font-family: 'Inter', sans-serif;
            animation: pulse 2s infinite;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 157, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            animation: none;
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.85rem;
            animation: none;
        }

        .btn-block {
            width: 100%;
        }

        .btn-success {
            background: var(--success);
            animation: none;
        }

        .btn-danger {
            background: var(--error);
            animation: none;
        }

        .btn-white {
            background: white;
            color: #333;
            animation: none;
        }

        .btn-white:hover {
            background: #f0f0f0;
            color: #333;
        }

        /* ============ ЗАГОЛОВКИ ============ */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            text-align: center;
            margin: 2rem 0;
            background: linear-gradient(135deg, #FF6B9D, #6C5CE7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: 2rem;
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .section-title {
                font-size: 2rem;
            }
            .section-subtitle {
                font-size: 1rem;
            }
        }

        /* ============ КАРТА (ЗАГЛУШКА) ============ */
        .map-container {
            width: 100%;
            height: 400px;
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray);
            border: 1px solid var(--card-border);
            position: relative;
            overflow: hidden;
        }

        .map-placeholder-content {
            text-align: center;
            z-index: 1;
        }

        .map-placeholder-content i {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        /* ============ СЕТКА МАСТЕРОВ ============ */
        .masters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            padding: 1rem 5%;
        }

        @media (max-width: 768px) {
            .masters-grid {
                grid-template-columns: 1fr;
                padding: 1rem;
            }
        }

        /* ============ КАРТОЧКА МАСТЕРА ============ */
        .master-card {
            background: var(--dark-card);
            backdrop-filter: blur(15px);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--card-border);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        .master-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: var(--primary);
        }

        .master-card-img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .master-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .master-card-img .placeholder-icon {
            font-size: 5rem;
            color: var(--gray);
        }

        .master-card-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--gradient);
            color: white;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .master-card-body {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .master-card-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .master-card-spec {
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .master-card-address {
            color: var(--gray);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .master-card-services {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 0.8rem 0;
        }

        .service-tag {
            background: rgba(255, 107, 157, 0.15);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .master-card-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .master-card-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
        }

        /* ============ ФИЛЬТРЫ ============ */
        .filters-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            padding: 1rem 5%;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
            border-radius: var(--radius);
        }

        .filter-select,
        .filter-input {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 50px;
            color: var(--light);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
        }

        .filter-input {
            width: 200px;
        }

        .filter-input::placeholder {
            color: var(--gray);
        }

        .filter-select {
            min-width: 180px;
        }

        .filter-select option {
            background: var(--dark);
            color: var(--light);
        }

        /* ============ ДЕТАЛИ МАСТЕРА ============ */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 3rem;
            padding: 2rem 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }

        .detail-photo-container {
            width: 100%;
            aspect-ratio: 1;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .detail-photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-photo-container .placeholder-icon {
            font-size: 8rem;
            color: var(--gray);
        }

        .detail-info h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .detail-info .own-profile-badge {
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: 400;
        }

        .detail-spec {
            color: var(--primary);
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .detail-rating {
            color: var(--warning);
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .detail-price {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin: 1rem 0;
        }

        .detail-address {
            color: var(--gray);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .detail-services {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 1rem 0;
        }

        .detail-services .service-tag {
            font-size: 0.9rem;
            padding: 8px 16px;
        }

        .detail-desc {
            color: var(--gray);
            line-height: 1.8;
            margin: 1rem 0;
        }

        .detail-schedule {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin: 1.5rem 0;
        }

        .detail-schedule h4 {
            margin-bottom: 1rem;
        }

        .schedule-day {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--card-border);
        }

        .schedule-day:last-child {
            border: none;
        }

        /* ============ СЛОТЫ ДЛЯ ЗАПИСИ ============ */
        .booking-section {
            margin-top: 2rem;
        }

        .booking-section h3 {
            margin-bottom: 1rem;
        }

        .booking-date-input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 1rem 0;
        }

        .slots-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 1rem;
        }

        .slot-btn {
            padding: 10px 18px;
            border-radius: 50px;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--light);
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
        }

        .slot-btn:hover:not(.booked) {
            border-color: var(--primary);
            background: rgba(255, 107, 157, 0.1);
        }

        .slot-btn.booked {
            background: rgba(255, 255, 255, 0.03);
            color: var(--gray);
            cursor: not-allowed;
            text-decoration: line-through;
        }

        .slot-btn.selected {
            background: var(--gradient);
            border-color: transparent;
            color: white;
        }

        .confirm-booking-btn {
            margin-top: 1.5rem;
            display: none;
        }

        .own-profile-message {
            color: var(--primary);
            margin-top: 2rem;
        }

        /* ============ АВТОРИЗАЦИЯ ============ */
        .auth-container {
            max-width: 450px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        .auth-card {
            background: var(--dark-card);
            backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--card-border);
        }

        .auth-card h3 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            text-align: center;
            color: var(--primary);
        }

        .auth-divider {
            text-align: center;
            color: var(--gray);
            margin: 1.5rem 0;
        }

        /* ============ КАБИНЕТ ============ */
        .cabinet-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            padding: 2rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .cabinet-layout {
                grid-template-columns: 1fr;
            }
        }

        .cabinet-sidebar {
            background: var(--dark-card);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            border: 1px solid var(--card-border);
            height: fit-content;
            position: sticky;
            top: 90px;
        }

        .cabinet-sidebar h3 {
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .cabinet-sidebar button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 12px 16px;
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
            border-radius: 12px;
            transition: 0.2s;
            font-size: 0.95rem;
            margin-bottom: 4px;
            font-family: 'Inter', sans-serif;
        }

        .cabinet-sidebar button:hover,
        .cabinet-sidebar button.active {
            background: rgba(255, 107, 157, 0.1);
            color: var(--primary);
        }

        .cabinet-sidebar .new-badge {
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 50px;
            font-size: 0.75rem;
            margin-left: 8px;
        }

        .cabinet-content {
            background: var(--dark-card);
            border-radius: var(--radius-lg);
            padding: 2rem;
            border: 1px solid var(--card-border);
        }

        /* ============ ФОРМЫ ============ */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--light);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--light);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.1);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--gray);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 1rem 0;
            cursor: pointer;
        }

        .form-checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        /* ============ РАСПИСАНИЕ В КАБИНЕТЕ ============ */
        .schedule-row {
            display: flex;
            gap: 1rem;
            align-items: center;
            padding: 1rem;
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        .schedule-row label {
            min-width: 130px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .schedule-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .schedule-row input[type="time"] {
            width: 130px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--light);
            font-family: 'Inter', sans-serif;
        }

        .schedule-row input[type="time"]:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .schedule-row span {
            color: var(--gray);
        }

        /* ============ СПИСОК ЗАПИСЕЙ ============ */
        .booking-item {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .booking-item-info strong {
            display: block;
            margin-bottom: 0.3rem;
        }

        .booking-item-info .booking-date-time {
            color: var(--primary);
        }

        .booking-item-info .booking-email {
            color: var(--gray);
            font-size: 0.85rem;
        }

        .booking-item-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* ============ ПРЕДПРОСМОТР КАРТОЧКИ ============ */
        .preview-card {
            max-width: 380px;
            cursor: default;
        }

        /* ============ БЕЙДЖИ СТАТУСОВ ============ */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-new {
            background: rgba(108, 92, 231, 0.2);
            color: #a29bfe;
        }

        .badge-confirmed {
            background: rgba(0, 206, 201, 0.2);
            color: #00CEC9;
        }

        .badge-cancelled {
            background: rgba(255, 118, 117, 0.2);
            color: #FF7675;
        }

        /* ============ ТОСТЫ ============ */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--gradient);
            color: white;
            padding: 1rem 1.8rem;
            border-radius: 50px;
            z-index: 3000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);

        /* ============ МОДАЛЬНЫЕ ОКНА ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;

            display: flex;
            align-items: center;
            justify-content: center;

            max-height: 90vh;
            overflow-y: auto;
            padding: 32px;
            border: 1px solid var(--card-border);

        .modal-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--primary);

        /* ============ ПУСТЫЕ СОСТОЯНИЯ ============ */

            text-align: center;
            padding: 4rem 2rem;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .empty-state p {
            margin-bottom: 1rem;
        }

        /* ============ ФУТЕР ============ */
        .footer {
            background: rgba(0, 0, 0, 0.3);
            padding: 2rem 5%;
            text-align: center;
            margin-top: 4rem;
            border-top: 1px solid var(--card-border);
            color: var(--gray);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* ============ СТАТУС СОХРАНЕНИЯ ============ */
        .save-status {
            margin-top: 1rem;
            color: var(--success);
            display: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- ==================== НАВИГАЦИЯ ==================== -->

    <!-- ==================== ГЛАВНАЯ СТРАНИЦА ==================== -->

    <!-- ==================== СТРАНИЦА МАСТЕРОВ ==================== -->
    <section id="mastersPage" class="page">

            <h2 class="section-title">Наши мастера</h2>
            
            <!-- Фильтры -->
            <div class="filters-bar">
                <input type="text" class="filter-input" placeholder="🔍 Поиск по имени или адресу..." id="searchMasterInput" oninput="loadMasters()">
                <select class="filter-select" id="sortMasters" onchange="loadMasters()">
                    <option value="rating">По рейтингу</option>
                    <option value="price_asc">Цена: сначала низкая</option>
                    <option value="price_desc">Цена: сначала высокая</option>
                </select>
                <select class="filter-select" id="filterSpec" onchange="loadMasters()">
                    <option value="">Все специализации</option>
                    <option value="Маникюр">Маникюр</option>
                    <option value="Педикюр">Педикюр</option>
                    <option value="Наращивание">Наращивание</option>
                    <option value="Дизайн ногтей">Дизайн ногтей</option>
                </select>
            </div>
            
            <!-- Сетка мастеров -->
            <div class="masters-grid" id="mastersGrid">
                <div class="empty-state">

                    <p>Загрузка мастеров...</p>
                </div>
            </div>

    <!-- ==================== ДЕТАЛИ МАСТЕРА ==================== -->
    <section id="masterDetailPage" class="page">
        <div id="masterDetailContent" style="max-width:1200px; margin:0 auto; padding:2rem 5%;"></div>
    </section>

    <!-- ==================== АВТОРИЗАЦИЯ ==================== -->
    <section id="authPage" class="page">
        <div class="auth-container" id="authContainer"></div>
    </section>

    <!-- ==================== КАБИНЕТ ==================== -->
    <section id="cabinetPage" class="page">
        <div id="cabinetContent" style="padding:2rem 5%; max-width:1400px; margin:0 auto;"></div>
    </section>

    <!-- ==================== ФУТЕР ==================== -->
    <footer class="footer">
        <p>© 2026 NailMasterGo. Найдите своего идеального мастера. 
            <a href="#" onclick="showPage('home')">Главная</a>
        </p>
    </footer>

    <!-- ==================== КОНТЕЙНЕРЫ ==================== -->
    <div id="modalContainer"></div>
    <div id="toastContainer"></div>

    <!-- ==================== ГЛАВНЫЙ СКРИПТ ==================== -->
    <script type="module">
        // ============ ИМПОРТ FIREBASE ============
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            signOut, 
            onAuthStateChanged, 
            updateProfile, 
            GoogleAuthProvider, 
            signInWithPopup 
        } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
        import { 
            getFirestore, 
            collection, 
            doc, 
            addDoc, 
            getDocs, 
            getDoc, 
            updateDoc, 
            setDoc, 
            query, 
            where, 
            orderBy, 
            serverTimestamp, 
            limit 
        } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

        // ============ КОНФИГУРАЦИЯ FIREBASE ============
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyBTlbTN6Sura-MUWdrAEqIaDE3VUlUCb_c",
            authDomain: "nailmastergo.firebaseapp.com",
            projectId: "nailmastergo",
            storageBucket: "nailmastergo.firebasestorage.app",
            messagingSenderId: "205974047718",
            appId: "1:205974047718:web:3b0a0b1dd89bf58dd32427"
        };

        // ============ ИНИЦИАЛИЗАЦИЯ FIREBASE ============
        const app = initializeApp(FIREBASE_CONFIG);
        const auth = getAuth(app);
        const db = getFirestore(app);

        console.log('🔥 NailMasterGo Firebase подключён:', FIREBASE_CONFIG.projectId);
        console.log('📦 Firestore:', db ? 'OK' : 'ERROR');
        console.log('👤 Auth:', auth ? 'OK' : 'ERROR');

        // ============ ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ============
        let currentUser = null;
        let userProfile = null;
        let allMasters = [];
        let currentMaster = null;
        let selectedDate = new Date().toISOString().split('T')[0];
        let selectedSlot = null;
        let isInitialized = false;

        // ============ ФУНКЦИЯ ТОСТОВ ============
        window.toast = (message) => {
            const el = document.createElement('div');
            el.className = 'toast';
            el.textContent = message;
            document.getElementById('toastContainer').appendChild(el);
            setTimeout(() => el.remove(), 3500);
        };

        // ============ ВЫПАДАЮЩЕЕ МЕНЮ ПОЛЬЗОВАТЕЛЯ ============
        window.toggleDropdown = () => {
            const menu = document.getElementById('dropdownMenu');
            if (menu) menu.classList.toggle('show');
        };

        window.closeDropdown = () => {
            const menu = document.getElementById('dropdownMenu');
            if (menu) menu.classList.remove('show');
        };

        // Закрытие выпадающего меню при клике вне его
        document.addEventListener('click', (event) => {
            if (!event.target.closest('#userDropdown')) {
                window.closeDropdown();
            }
        });

        // ============ НАВИГАЦИЯ ПО СТРАНИЦАМ (с hash) ============
        window.showPage = (pageName) => {
            console.log('📍 Переход на страницу:', pageName);
            
            // Сохраняем страницу в URL hash
            window.location.hash = pageName;
            
            // Активируем страницу
            activatePage(pageName);
        };

        // Функция активации страницы (без изменения hash)
        function activatePage(pageName) {
            console.log('📄 Активируем страницу:', pageName);
            
            // Скрываем все страницы
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });

            // Показываем нужную страницу
            const targetPage = document.getElementById(pageName + 'Page');
            if (targetPage) {
                targetPage.classList.add('active');
                console.log('✅ Страница активирована:', pageName + 'Page');
            } else {
                console.error('❌ Страница не найдена:', pageName + 'Page');
                // Если страница не найдена — показываем главную
                const homePage = document.getElementById('homePage');
                if (homePage) homePage.classList.add('active');
                pageName = 'home';
            }

            // Скролл вверх
            window.scrollTo(0, 0);

            // Закрываем мобильное меню
            if (window.innerWidth <= 768) {
                document.getElementById('navLinks').classList.remove('active');
            }

            // Закрываем выпадающее меню
            window.closeDropdown();

            // Загружаем данные для конкретных страниц
            if (pageName === 'masters') {
                loadMasters();
            }
            if (pageName === 'cabinet') {
                console.log('📋 Загружаем кабинет...');
                loadCabinet();
            }
            if (pageName === 'auth') {
                renderAuth();
            }
        }

        // Обработчик изменения hash (когда пользователь нажимает "назад" в браузере)
        window.addEventListener('hashchange', () => {
            const pageName = window.location.hash.replace('#', '') || 'home';
            console.log('🔗 Hash изменился на:', pageName);
            activatePage(pageName);
        });

        // ============ МОБИЛЬНОЕ МЕНЮ ============
        window.toggleMenu = () => {
            document.getElementById('navLinks').classList.toggle('active');
        };

        // ============ ЗАКРЫТИЕ МОДАЛЬНЫХ ОКОН ============
        window.closeModal = () => {
            document.getElementById('modalContainer').innerHTML = '';
        };

        // ============ ВЫХОД ИЗ АККАУНТА ============
        window.logout = async () => {
            try {
                await signOut(auth);
                currentUser = null;
                userProfile = null;
                isInitialized = false;
                
                // Обновляем UI
                document.getElementById('userDropdown').style.display = 'none';
                document.getElementById('authNavBtn').style.display = 'inline-block';
                document.getElementById('cabinetNavItem').style.display = 'none';
                
                window.toast('👋 Вы вышли из аккаунта');
                window.showPage('home');
            } catch (error) {
                console.error('Ошибка выхода:', error);
                window.toast('Ошибка выхода: ' + error.message);
            }
        };

        // ============ ЗАГРУЗКА СПИСКА МАСТЕРОВ ============
        async function loadMasters() {
            const grid = document.getElementById('mastersGrid');
            if (!grid) {
                console.error('❌ mastersGrid не найден в DOM');
                return;
            }

            grid.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Загрузка мастеров...</p></div>';

            try {
                // Загружаем только активных мастеров
                const mastersQuery = query(
                    collection(db, 'masters'), 
                    where('active', '==', true)
                );
                const snapshot = await getDocs(mastersQuery);
                allMasters = snapshot.docs.map(doc => ({ 
                    id: doc.id, 
                    ...doc.data() 
                }));
                
                console.log('📊 Загружено мастеров:', allMasters.length);

                // Получаем значения фильтров
                const searchTerm = (document.getElementById('searchMasterInput')?.value || '').toLowerCase();
                const specialization = document.getElementById('filterSpec')?.value || '';
                const sortBy = document.getElementById('sortMasters')?.value || 'rating';

                // Применяем фильтры
                let filtered = [...allMasters];

                if (searchTerm) {
                    filtered = filtered.filter(master =>
                        (master.name || '').toLowerCase().includes(searchTerm) ||
                        (master.address || '').toLowerCase().includes(searchTerm)
                    );
                }

                if (specialization) {
                    filtered = filtered.filter(master =>
                        (master.specialization || '').includes(specialization) ||
                        (master.services || []).includes(specialization)
                    );
                }

                // Применяем сортировку
                if (sortBy === 'price_asc') {
                    filtered.sort((a, b) => (a.priceFrom || 9999) - (b.priceFrom || 9999));
                } else if (sortBy === 'price_desc') {
                    filtered.sort((a, b) => (b.priceFrom || 0) - (a.priceFrom || 0));
                } else {
                    // По умолчанию — по рейтингу
                    filtered.sort((a, b) => (b.rating || 5) - (a.rating || 5));
                }

                // Проверяем, есть ли результаты
                if (filtered.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-user-slash"></i>
                            <p>Мастеров не найдено</p>
                            <button class="btn" onclick="showPage('auth')">Стать первым мастером</button>
                        </div>`;
                    return;
                }

                // Рендерим карточки мастеров
                grid.innerHTML = filtered.map(master => `
                    <div class="master-card" onclick="showMasterDetail('${master.id}')">
                        <div class="master-card-img">
                            ${master.photoURL ? 
                                `<img src="${master.photoURL}" alt="${master.name}" 
                                     onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\\'fas fa-user-circle placeholder-icon\\'></i>'">` :
                                '<i class="fas fa-user-circle placeholder-icon"></i>'
                            }
                            <div class="master-card-badge">★ ${(master.rating || 5).toFixed(1)}</div>
                        </div>
                        <div class="master-card-body">
                            <div class="master-card-name">${master.name || 'Мастер'}</div>
                            <div class="master-card-spec">${master.specialization || 'Ногтевой сервис'}</div>
                            <div class="master-card-address">
                                <i class="fas fa-map-marker-alt"></i> ${master.address || 'Адрес уточняется'}
                            </div>
                            <div class="master-card-services">
                                ${(master.services || ['Маникюр']).slice(0, 3).map(service => 
                                    `<span class="service-tag">${service}</span>`
                                ).join('')}
                            </div>
                            <div class="master-card-footer">
                                <div class="master-card-price">от ${master.priceFrom || 800} ₽</div>
                                <button class="btn btn-sm" onclick="event.stopPropagation(); bookMaster('${master.id}')">
                                    Записаться
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('❌ Ошибка загрузки мастеров:', error);
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Ошибка загрузки. Проверьте консоль (F12)</p>
                    </div>`;
            }
        }

        // ============ ДЕТАЛИ МАСТЕРА ============
        window.showMasterDetail = async (masterId) => {
            console.log('👤 Открываем мастера:', masterId);
            window.showPage('masterDetail');
            
            const container = document.getElementById('masterDetailContent');
            if (!container) {
                console.error('❌ masterDetailContent не найден');
                return;
            }

            container.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Загрузка...</p></div>';

            try {
                const masterDoc = await getDoc(doc(db, 'masters', masterId));
                if (!masterDoc.exists()) {
                    container.innerHTML = '<div class="empty-state"><p>Мастер не найден</p></div>';
                    return;
                }

                currentMaster = { id: masterDoc.id, ...masterDoc.data() };
                const master = currentMaster;
                console.log('👤 Данные мастера загружены:', master.name);

                // Проверяем, не смотрит ли мастер сам на себя
                const isOwnProfile = currentUser && master.userId === currentUser.uid;

                // Рендерим расписание
                const days = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ', 'ВС'];
                const dayNames = ['Понедельник', 'Вторник', 'Среда', 'Четверг', 'Пятница', 'Суббота', 'Воскресенье'];
                
                const scheduleHtml = days.map((day, index) => {
                    const daySchedule = master.schedule?.[day];
                    if (daySchedule && daySchedule.enabled) {
                        return `
                            <div class="schedule-day">
                                <span>${dayNames[index]}</span>
                                <span style="color:var(--success);">${daySchedule.start || '9:00'} - ${daySchedule.end || '18:00'}</span>
                            </div>`;
                    }
                    return `
                        <div class="schedule-day">
                            <span>${dayNames[index]}</span>
                            <span style="color:var(--gray);">Выходной</span>
                        </div>`;
                }).join('');

                // Собираем HTML страницы
                container.innerHTML = `
                    <div class="detail-grid">
                        <!-- Левая колонка: фото и расписание -->
                        <div>
                            <div class="detail-photo-container">
                                ${master.photoURL ? 
                                    `<img src="${master.photoURL}" alt="${master.name}" 
                                         onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\\'fas fa-user-circle placeholder-icon\\'></i>'">` :
                                    '<i class="fas fa-user-circle placeholder-icon"></i>'
                                }
                            </div>
                            <div class="detail-schedule">
                                <h4><i class="fas fa-calendar-alt"></i> Расписание работы</h4>
                                ${scheduleHtml}
                            </div>
                        </div>

                        <!-- Правая колонка: информация и запись -->
                        <div class="detail-info">
                            <h1>
                                ${master.name} 
                                ${isOwnProfile ? '<span class="own-profile-badge">(это вы)</span>' : ''}
                            </h1>
                            <div class="detail-spec">${master.specialization || 'Ногтевой сервис'}</div>
                            <div class="detail-rating">
                                ★ ${(master.rating || 5).toFixed(1)} (${master.reviewCount || 0} отзывов)
                            </div>
                            <div class="detail-price">от ${master.priceFrom || 800} ₽</div>
                            <p class="detail-address">
                                <i class="fas fa-map-marker-alt"></i> ${master.address || 'Адрес не указан'}
                            </p>
                            
                            <div class="detail-services">
                                ${(master.services || ['Маникюр']).map(service => 
                                    `<span class="service-tag">${service}</span>`
                                ).join('')}
                            </div>
                            
                            <div class="detail-desc">
                                ${master.description || 'Опытный мастер ногтевого сервиса. Индивидуальный подход к каждому клиенту.'}
                            </div>

                            ${!isOwnProfile ? `
                                <!-- Блок записи (только для клиентов) -->
                                <div class="booking-section">
                                    <h3><i class="fas fa-clock"></i> Доступное время для записи</h3>
                                    <input type="date" 
                                           id="bookingDate" 
                                           class="booking-date-input"
                                           value="${selectedDate}" 
                                           min="${new Date().toISOString().split('T')[0]}" 
                                           onchange="selectedDate = this.value; window.loadSlots('${master.id}')">
                                    <div class="slots-container" id="slotsContainer">
                                        <p style="color:var(--gray);">Выберите дату</p>
                                    </div>
                                    <button class="btn btn-block confirm-booking-btn" 
                                            id="confirmBtn" 
                                            onclick="confirmBooking('${master.id}')">

                // Загружаем слоты, если это не свой профиль
                if (!isOwnProfile) {

                }

            } catch (error) {

        // ============ ЗАГРУЗКА ДОСТУПНЫХ СЛОТОВ ============
        window.loadSlots = async (masterId) => {
            console.log('🕐 Загружаем слоты для мастера:', masterId, 'на дату:', selectedDate);
            
            const container = document.getElementById('slotsContainer');
            const confirmBtn = document.getElementById('confirmBtn');
            
            if (!container) {
                console.error('❌ slotsContainer не найден');
                return;
            }

            container.innerHTML = '<p style="color:var(--gray);">Загрузка слотов...</p>';
            selectedSlot = null;
            if (confirmBtn) confirmBtn.style.display = 'none';

            try {
                // Получаем данные мастера
                const master = currentMaster || (await getDoc(doc(db, 'masters', masterId))).data();
                
                if (!master || !master.schedule) {
                    container.innerHTML = '<p style="color:var(--gray);">Расписание не настроено</p>';
                    return;
                }

                // Определяем день недели для выбранной даты
                const daysMap = ['ВС', 'ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ'];
                const date = new Date(selectedDate);
                const dayKey = daysMap[date.getDay()];
                const daySchedule = master.schedule[dayKey];

                if (!daySchedule || !daySchedule.enabled) {
                    container.innerHTML = '<p style="color:var(--gray);">В этот день мастер не работает</p>';
                    return;
                }

                // Генерируем слоты с шагом 30 минут
                const slots = [];
                const startHour = parseInt(daySchedule.start.split(':')[0]) || 9;
                const endHour = parseInt(daySchedule.end.split(':')[0]) || 18;

                for (let hour = startHour; hour < endHour; hour++) {
                    slots.push(`${String(hour).padStart(2, '0')}:00`);
                    slots.push(`${String(hour).padStart(2, '0')}:30`);
                }

                // Проверяем занятые слоты в базе
                const bookingsQuery = query(
                    collection(db, 'bookings'),
                    where('masterId', '==', masterId),
                    where('date', '==', selectedDate),
                    where('status', 'in', ['new', 'confirmed'])
                );
                const bookingsSnapshot = await getDocs(bookingsQuery);
                const bookedSlots = bookingsSnapshot.docs.map(doc => doc.data().time);
                
                console.log('📅 Занятые слоты:', bookedSlots);

                // Рендерим слоты
                container.innerHTML = slots.map(slot => {
                    const isBooked = bookedSlots.includes(slot);
                    return `
                        <button class="slot-btn ${isBooked ? 'booked' : ''}" 
                            ${isBooked ? 'disabled' : `onclick="window.selectSlot('${slot}', this)"`}>
                            ${slot} ${isBooked ? '❌' : '✓'}
                        </button>`;
                }).join('');

                if (slots.length === 0) {
                    container.innerHTML = '<p style="color:var(--gray);">Нет доступных слотов на этот день</p>';
                }

            } catch (error) {
                console.error('❌ Ошибка загрузки слотов:', error);
                container.innerHTML = `<p style="color:var(--error);">Ошибка: ${error.message}</p>`;
            }
        };

        // ============ ВЫБОР СЛОТА ============
        window.selectSlot = (time, buttonElement) => {
            selectedSlot = time;
            
            // Снимаем выделение со всех слотов
            document.querySelectorAll('.slot-btn.selected').forEach(btn => {
                btn.classList.remove('selected');
            });
            
            // Выделяем выбранный слот
            buttonElement.classList.add('selected');
            
            // Показываем кнопку подтверждения

            if (confirmBtn) confirmBtn.style.display = 'flex';

        // ============ АВТОРИЗАЦИЯ ЧЕРЕЗ EMAIL ============
        window.emailAuth = async (mode) => {
            const emailInput = document.getElementById('authEmail');
            const passInput = document.getElementById('authPass');
            const roleInput = document.getElementById('authRole');
            
            const email = emailInput?.value?.trim();
            const password = passInput?.value?.trim();
            const role = roleInput?.value || 'client';

            // Валидация
            if (!email || !password) {
                window.toast('Заполните все поля');
                return;
            }
            if (password.length < 6) {
                window.toast('Пароль должен быть минимум 6 символов');
                return;
            }

            try {
                if (mode === 'register') {
                    // ===== РЕГИСТРАЦИЯ =====
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(userCredential.user, { 
                        displayName: email.split('@')[0] 
                    });
                    
                    // Сохраняем пользователя в Firestore
                    await setDoc(doc(db, 'users', userCredential.user.uid), {
                        email: email,
                        role: role,
                        name: email.split('@')[0],
                        createdAt: serverTimestamp()
                    });

                    // Если регистрируется как мастер — создаём профиль мастера
                    if (role === 'master') {
                        await setDoc(doc(db, 'masters', userCredential.user.uid), {
                            userId: userCredential.user.uid,
                            name: email.split('@')[0],

                            reviewCount: 0,

                            address: '',
                            phone: '',
                            description: '',
                            photoURL: '',
                            schedule: {
                                'ПН': { enabled: true, start: '09:00', end: '18:00' },
                                'ВТ': { enabled: true, start: '09:00', end: '18:00' },
                                'СР': { enabled: true, start: '09:00', end: '18:00' },
                                'ЧТ': { enabled: true, start: '09:00', end: '18:00' },
                                'ПТ': { enabled: true, start: '09:00', end: '18:00' },
                                'СБ': { enabled: false, start: '09:00', end: '18:00' },
                                'ВС': { enabled: false, start: '09:00', end: '18:00' }
                            },
                            createdAt: serverTimestamp()
                        });
                        window.toast('✅ Профиль мастера создан! Настройте его в Кабинете.');
                    } else {
                        window.toast('✅ Регистрация успешна!');
                    }
                } else {
                    // ===== ВХОД =====
                    await signInWithEmailAndPassword(auth, email, password);
                    window.toast('✅ Вход выполнен!');
                }

                window.showPage('home');

            } catch (error) {
                console.error('❌ Ошибка авторизации:', error);
                
                let errorMessage = 'Ошибка авторизации';
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'Этот email уже занят';
                } else if (error.code === 'auth/invalid-credential') {
                    errorMessage = 'Неверный email или пароль';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Пароль слишком простой';
                } else {
                    errorMessage = error.message;
                }
                
                window.toast('❌ ' + errorMessage);
            }
        };

                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (!userDoc.exists()) {
                    // Создаём профиль для нового Google-пользователя
                    await setDoc(doc(db, 'users', user.uid), {
                        email: user.email,
                        role: 'client',
                        name: user.displayName || user.email?.split('@')[0],
                        photoURL: user.photoURL,
                        createdAt: serverTimestamp()
                    });

                window.toast('✅ Вход через Google успешен!');
                window.showPage('home');

                console.error('❌ Ошибка Google входа:', error);
                
                if (error.code === 'auth/unauthorized-domain') {
                    window.toast('❌ Добавьте домен в Authorized domains в Firebase Console');

                    window.toast('Вы отменили вход через Google');

                    window.toast('❌ Ошибка входа через Google');
                }
            }
        };

                                            ${booking.status === 'new' ? `
                                                <button class="btn btn-sm btn-success" 
                                                        onclick="updateBookingStatus('${booking.id}', 'confirmed')">
                                                    ✓ Принять
                                                </button>
                                                <button class="btn btn-sm btn-danger" 
                                                        onclick="updateBookingStatus('${booking.id}', 'cancelled')">
                                                    ✕ Отклонить
                                                </button>
                                            ` : ''}
                                        </div>
                                    </div>
                                `).join('')
                            }
                        `;
                    }

                    // ===== ВКЛАДКА ПРЕДПРОСМОТРА =====
                    else if (tabName === 'preview') {
                        tabContent.innerHTML = `
                            <h3>Предпросмотр профиля</h3>
                            <p style="color:var(--gray);margin-bottom:1.5rem;">
                                Так вашу карточку видят клиенты
                            </p>
                            
                            <div class="master-card preview-card">
                                <div class="master-card-img">
                                    ${masterData.photoURL ? 
                                        `<img src="${masterData.photoURL}" alt="${masterData.name}">` : 
                                        '<i class="fas fa-user-circle placeholder-icon"></i>'
                                    }
                                    <div class="master-card-badge">
                                        ★ ${(masterData.rating || 5).toFixed(1)}
                                    </div>
                                </div>
                                <div class="master-card-body">
                                    <div class="master-card-name">${masterData.name || 'Ваше имя'}</div>
                                    <div class="master-card-spec">${masterData.specialization || 'Специализация'}</div>
                                    <div class="master-card-address">
                                        <i class="fas fa-map-marker-alt"></i> ${masterData.address || 'Адрес'}
                                    </div>
                                    <div class="master-card-services">
                                        ${(masterData.services || ['Маникюр']).slice(0, 3).map(service => 
                                            `<span class="service-tag">${service}</span>`
                                        ).join('')}
                                    </div>
                                    <div class="master-card-footer">
                                        <div class="master-card-price">
                                            от ${masterData.priceFrom || 800} ₽
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <button class="btn btn-outline" 
                                    onclick="window.showMasterDetail('${currentUser.uid}')" 
                                    style="margin-top:1rem;">
                                <i class="fas fa-external-link-alt"></i> Открыть полный просмотр
                            </button>
                        `;
                    }
                };

                // Загружаем первую вкладку (профиль)
                window.switchTab('profile');

            } else {
                // ============ КАБИНЕТ КЛИЕНТА ============
                const bookingsQuery = query(
                    collection(db, 'bookings'),
                    where('clientId', '==', currentUser.uid),
                    orderBy('createdAt', 'desc'),
                    limit(50)
                );
                const bookingsSnapshot = await getDocs(bookingsQuery);
                const bookings = bookingsSnapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));

                container.innerHTML = `
                    <h2 style="margin-bottom:2rem;">👋 Мои записи</h2>
                    
                    ${bookings.length === 0 ? `
                        <div class="empty-state">
                            <i class="fas fa-calendar-plus"></i>
                            <p>У вас пока нет записей</p>
                            <button class="btn" onclick="showPage('masters')" style="margin-top:1rem;">
                                <i class="fas fa-search"></i> Найти мастера
                            </button>
                        </div>
                    ` : `
                        <div style="display:grid; gap:1rem; max-width:800px;">
                            ${bookings.map(booking => `
                                <div style="background:var(--dark-card); padding:1.5rem; border-radius:var(--radius-lg); 
                                            border:1px solid var(--card-border);">
                                    <div style="display:flex; justify-content:space-between; align-items:center; 
                                                flex-wrap:wrap; gap:1rem;">
                                        <div>
                                            <strong>${booking.clientName || 'Вы'}</strong><br>
                                            <span style="color:var(--primary);">📅 ${booking.date} в ${booking.time}</span><br>
                                            <small style="color:var(--gray);">Мастер ID: ${booking.masterId?.slice(0, 8)}...</small>
                                        </div>
                                        <span class="badge badge-${booking.status}">
                                            ${booking.status === 'new' ? 'Ожидает подтверждения' : 
                                              booking.status === 'confirmed' ? 'Подтверждена ✅' : 'Отменена ❌'}
                                        </span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `}
                `;
            }
        }

        // ============ СОХРАНЕНИЕ ПРОФИЛЯ МАСТЕРА ============
        window.saveMasterProfile = async () => {
            console.log('💾 Сохраняем профиль мастера...');
            
            const profileData = {
                name: document.getElementById('mName')?.value || '',
                specialization: document.getElementById('mSpec')?.value || '',
                address: document.getElementById('mAddr')?.value || '',
                priceFrom: Number(document.getElementById('mPrice')?.value) || 800,
                phone: document.getElementById('mPhone')?.value || '',
                description: document.getElementById('mDesc')?.value || '',
                services: (document.getElementById('mServ')?.value || '')
                    .split(',')
                    .map(s => s.trim())
                    .filter(Boolean),
                photoURL: document.getElementById('mPhoto')?.value || '',
                active: document.getElementById('mActive')?.checked || false,
                userId: currentUser.uid
            };

            console.log('📤 Отправляем данные:', profileData);

            try {
                await setDoc(doc(db, 'masters', currentUser.uid), profileData, { merge: true });
                
                // Показываем статус сохранения
                const statusEl = document.getElementById('profileStatus');
                if (statusEl) {
                    statusEl.style.display = 'block';
                    setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
                }
                
                window.toast('✅ Профиль сохранён!');
                console.log('✅ Профиль успешно сохранён в Firestore');
            } catch (error) {
                console.error('❌ Ошибка сохранения профиля:', error);
                window.toast('❌ Ошибка сохранения: ' + error.message);
            }
        };

        // ============ СОХРАНЕНИЕ РАСПИСАНИЯ ============
        window.saveSchedule = async () => {
            console.log('💾 Сохраняем расписание...');
            
            const days = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ', 'ВС'];
            const schedule = {};

            days.forEach(day => {
                const checkbox = document.querySelector(`.schedule-checkbox[data-day="${day}"]`);
                const startInput = document.querySelector(`.schedule-start[data-day="${day}"]`);
                const endInput = document.querySelector(`.schedule-end[data-day="${day}"]`);
                
                schedule[day] = {
                    enabled: checkbox?.checked || false,
                    start: startInput?.value || '09:00',
                    end: endInput?.value || '18:00'
                };
            });

            console.log('📤 Отправляем расписание:', schedule);

            try {
                await updateDoc(doc(db, 'masters', currentUser.uid), { schedule });
                
                // Показываем статус сохранения
                const statusEl = document.getElementById('scheduleStatus');
                if (statusEl) {
                    statusEl.style.display = 'block';
                    setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
                }
                
                window.toast('✅ Расписание сохранено!');
                console.log('✅ Расписание успешно сохранено в Firestore');
            } catch (error) {
                console.error('❌ Ошибка сохранения расписания:', error);
                window.toast('❌ Ошибка сохранения: ' + error.message);
            }
        };

        // ============ ОБНОВЛЕНИЕ СТАТУСА ЗАПИСИ ============
        window.updateBookingStatus = async (bookingId, newStatus) => {
            console.log(`🔄 Обновление записи ${bookingId} → ${newStatus}`);
            
            try {
                await updateDoc(doc(db, 'bookings', bookingId), { status: newStatus });
                
                const message = newStatus === 'confirmed' 
                    ? '✅ Запись подтверждена! Клиент будет рад.' 
                    : '❌ Запись отклонена';
                window.toast(message);
                
                // Перезагружаем кабинет
                loadCabinet();
            } catch (error) {
                console.error('❌ Ошибка обновления статуса:', error);
                window.toast('❌ Ошибка: ' + error.message);
            }
        };

        // ============ ОТСЛЕЖИВАНИЕ АВТОРИЗАЦИИ (с восстановлением страницы) ============
        onAuthStateChanged(auth, async (user) => {
            console.log('🔄 Состояние авторизации изменилось:', user ? 'вошёл' : 'вышел');
            
            currentUser = user;
            
            const authButton = document.getElementById('authNavBtn');
            const userDropdown = document.getElementById('userDropdown');
            const userNameDisplay = document.getElementById('userDisplayName');
            const cabinetNavItem = document.getElementById('cabinetNavItem');

            if (user) {
                // Пользователь авторизован
                if (!userProfile) {
                    const userDoc = await getDoc(doc(db, 'users', user.uid));
                    if (userDoc.exists()) {
                        userProfile = userDoc.data();
                    } else {
                        // Создаём профиль если его нет (для Google-пользователей)
                        userProfile = {
                            email: user.email,
                            role: 'client',
                            name: user.displayName || user.email?.split('@')[0],
                            photoURL: user.photoURL,
                            createdAt: new Date()
                        };
                        await setDoc(doc(db, 'users', user.uid), {
                            ...userProfile,
                            createdAt: serverTimestamp()
                        });
                        console.log('✅ Автосоздан профиль для:', user.email);
                    }
                }

                // Обновляем UI
                userNameDisplay.textContent = userProfile?.name || user.displayName || user.email?.split('@')[0] || 'Я';
                userDropdown.style.display = 'block';
                authButton.style.display = 'none';
                cabinetNavItem.style.display = 'block';

            } else {
                // Пользователь вышел
                userProfile = null;
                userDropdown.style.display = 'none';
                authButton.style.display = 'inline-block';
                cabinetNavItem.style.display = 'none';
            }

            // ===== ВАЖНО: Восстанавливаем страницу из hash =====
            if (!isInitialized) {
                isInitialized = true;
                const hash = window.location.hash.replace('#', '') || 'home';
                console.log('🔄 Первый запуск, восстанавливаем страницу из hash:', hash);
                
                // Не показываем страницу auth если пользователь авторизован
                if (hash === 'auth' && currentUser) {
                    activatePage('cabinet');
                } else {
                    activatePage(hash);
                }
            }
        });

        // ============ ЗАПУСК ПРИЛОЖЕНИЯ ============
        console.log('🚀 NailMasterGo полностью готов к работе');
        console.log('💡 Зарегистрируйтесь как "мастер" чтобы создать профиль');
        console.log('💡 Зарегистрируйтесь как "клиент" чтобы записываться');
        console.log('💡 Не забудьте добавить домен в Authorized domains (Authentication → Settings)');
        console.log('📋 Правила Firestore должны разрешать чтение/запись для всех авторизованных');
        console.log('🔗 Текущая страница сохраняется в URL (hash) — при перезагрузке восстановится');
    </script>

</body>
</html>
