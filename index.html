<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NailMasterGo — бронирование мастеров ногтевого сервиса</title>
    
    <!-- Фавиконка -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💅</text></svg>">
    
    <!-- Иконочный шрифт Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Яндекс.Карты API (JavaScript API) -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=637abd24-6ba5-4475-a0e1-775e7b2e905d&lang=ru_RU" type="text/javascript"></script>
    
    <style>
        /* ============ СБРОС И ПЕРЕМЕННЫЕ ============ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B9D;
            --primary-dark: #E5507A;
            --secondary: #6C5CE7;
            --accent: #00CEC9;
            --light: #FFFFFF;
            --dark: #1A1A2E;
            --dark-card: rgba(26, 26, 46, 0.9);
            --gray: #A0A0B0;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --gradient: linear-gradient(135deg, #FF6B9D 0%, #6C5CE7 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #00CEC9;
            --error: #FF7675;
            --warning: #FDCB6E;
            --radius: 16px;
            --radius-lg: 24px;
        }

        /* ============ БАЗОВЫЕ СТИЛИ С ФОНОМ ============ */
        body {
            font-family: 'Inter', sans-serif;
            background: 
                linear-gradient(135deg, rgba(26, 26, 46, 0.82) 0%, rgba(22, 33, 62, 0.88) 100%),
                url('https://raw.githubusercontent.com/Dbv01/NailMasterGo/main/web.webp') center/cover fixed;
            color: var(--light);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Лёгкое затемнение для читаемости */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(26, 26, 46, 0.15);
            pointer-events: none;
            z-index: -2;
        }

        /* Мобильный фон */
        @media (max-width: 768px) {
            body {
                background: 
                    linear-gradient(135deg, rgba(26, 26, 46, 0.82) 0%, rgba(22, 33, 62, 0.88) 100%),
                    url('https://raw.githubusercontent.com/Dbv01/NailMasterGo/main/1934de997ba5b55e829aa032d951f802.jpg') center/cover fixed;
            }
        }

        /* ============ АНИМАЦИИ ============ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 157, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(255, 107, 157, 0); }
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* ============ СТРАНИЦЫ ============ */
        .page {
            display: none !important;
            padding-top: 80px;
            min-height: 100vh;
            animation: fadeIn 0.4s ease;
            position: relative;
            z-index: 1;
        }

        .page.active {
            display: block !important;
        }

        /* ============ НАВИГАЦИЯ ============ */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid var(--card-border);
            height: 70px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: -1px;
            user-select: none;
        }

        .logo span {
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
            align-items: center;
        }

        .nav-link {
            color: var(--gray);
            font-weight: 500;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 0.95rem;
            transition: 0.3s;
            position: relative;
            padding: 0.5rem 0;
            font-family: 'Inter', sans-serif;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient);
            transition: 0.3s;
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--primary);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--light);
            font-size: 1.8rem;
            cursor: pointer;
        }

        /* ============ ВЫПАДАЮЩЕЕ МЕНЮ ПОЛЬЗОВАТЕЛЯ ============ */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background: var(--dark-card);
            border-radius: 12px;
            padding: 8px;
            min-width: 200px;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            z-index: 1001;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-menu button {
            display: block;
            width: 100%;
            padding: 10px 16px;
            background: none;
            border: none;
            color: var(--light);
            cursor: pointer;
            border-radius: 8px;
            text-align: left;
            font-size: 0.9rem;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .dropdown-menu button:hover {
            background: rgba(255, 107, 157, 0.15);
            color: var(--primary);
        }

        .dropdown-menu .logout-btn {
            color: var(--error);
        }

        .dropdown-menu .logout-btn:hover {
            background: rgba(255, 118, 117, 0.15);
        }

        /* ============ АДАПТИВНОСТЬ НАВИГАЦИИ ============ */
        @media (max-width: 768px) {
            .nav-links {
                position: fixed;
                top: 70px;
                left: 0;
                width: 100%;
                background: rgba(26, 26, 46, 0.98);
                flex-direction: column;
                padding: 2rem;
                transform: translateY(-100%);
                opacity: 0;
                visibility: hidden;
                transition: 0.3s;
                z-index: 999;
                gap: 1rem;
            }

            .nav-links.active {
                transform: translateY(0);
                opacity: 1;
                visibility: visible;
            }

            .mobile-menu-btn {
                display: block;
            }
        }

        /* ============ КНОПКИ ============ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--gradient);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 0.3px;
            font-family: 'Inter', sans-serif;
            animation: pulse 2s infinite;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 157, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            animation: none;
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.85rem;
            animation: none;
        }

        .btn-block {
            width: 100%;
        }

        .btn-success {
            background: var(--success);
            animation: none;
        }

        .btn-danger {
            background: var(--error);
            animation: none;
        }

        .btn-white {
            background: white;
            color: #333;
            animation: none;
        }

        .btn-white:hover {
            background: #f0f0f0;
            color: #333;
        }

        .btn-ghost {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--light);
            animation: none;
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* ============ ЗАГОЛОВКИ ============ */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            text-align: center;
            margin: 2rem 0;
            background: linear-gradient(135deg, #FF6B9D, #6C5CE7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section-subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: 2rem;
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .section-title { font-size: 2rem; }
            .section-subtitle { font-size: 1rem; }
        }

        /* ============ КАРТА ============ */
        #yandexMap {
            width: 100%;
            height: 500px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--card-border);
            margin-bottom: 1rem;
            background: var(--card-bg);
            position: relative;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            #yandexMap { height: 350px; border-radius: var(--radius); }
        }

        .map-loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(26, 26, 46, 0.7);
            z-index: 10;
            border-radius: var(--radius-lg);
        }

        .map-loading-overlay.hidden {
            display: none;
        }

        .map-controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            padding: 1rem 5%;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
            border-radius: var(--radius);
        }

        @media (max-width: 480px) {
            .map-controls { justify-content: center; padding: 0.8rem 3%; gap: 0.5rem; }
        }

        .map-control-btn {
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid var(--card-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--light);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 480px) {
            .map-control-btn { padding: 8px 14px; font-size: 0.8rem; }
        }

        .map-control-btn:hover,
        .map-control-btn.active {
            background: var(--gradient);
            border-color: transparent;
        }

        /* ============ ПОИСК 2026 ============ */
        .search-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto 2rem;
            padding: 0 1rem;
        }

        .search-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--glass);
            border: 2px solid var(--glass-border);
            border-radius: 50px;
            padding: 4px;
            transition: 0.3s;
        }

        .search-input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(255, 107, 157, 0.2);
        }

        .search-input-wrapper input {
            flex: 1;
            padding: 14px 20px;
            background: none;
            border: none;
            color: var(--light);
            font-size: 1.1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            min-width: 0;
        }

        .search-input-wrapper input::placeholder {
            color: var(--gray);
        }

        .search-input-wrapper button {
            padding: 12px 24px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        @media (max-width: 480px) {
            .search-input-wrapper input { padding: 12px 14px; font-size: 0.95rem; }
            .search-input-wrapper button { padding: 10px 14px; font-size: 0.85rem; }
            .search-btn-text { display: none; }
        }

        .search-input-wrapper button:hover {
            box-shadow: 0 5px 20px rgba(255, 107, 157, 0.4);
        }

        .filter-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 1rem;
        }

        @media (max-width: 480px) {
            .filter-chips { gap: 6px; }
        }

        .filter-chip {
            padding: 8px 18px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: var(--gray);
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            .filter-chip { padding: 6px 12px; font-size: 0.75rem; }
        }

        .filter-chip:hover,
        .filter-chip.active {
            background: var(--gradient);
            color: white;
            border-color: transparent;
        }

        /* ============ СЕТКА МАСТЕРОВ ============ */
        .masters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
            padding: 1rem 5%;
        }

        @media (max-width: 768px) {
            .masters-grid { grid-template-columns: 1fr; padding: 0.5rem 1rem; gap: 1.5rem; }
        }

        /* ============ КАРТОЧКА МАСТЕРА ============ */
        .master-card {
            background: var(--dark-card);
            backdrop-filter: blur(15px);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--card-border);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            animation: scaleIn 0.4s ease;
        }

        .master-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: var(--primary);
        }

        .master-card-img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        @media (max-width: 480px) {
            .master-card-img { height: 200px; }
        }

        .master-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s;
        }

        .master-card:hover .master-card-img img {
            transform: scale(1.05);
        }

        .master-card-img .placeholder-icon {
            font-size: 5rem;
            color: var(--gray);
        }

        .master-card-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--gradient);
            color: white;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .master-card-portfolio-count {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            backdrop-filter: blur(10px);
        }

        .master-card-body {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 480px) {
            .master-card-body { padding: 1rem; }
        }

        .master-card-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .master-card-spec {
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .master-card-address {
            color: var(--gray);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .master-card-services {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 0.8rem 0;
        }

        .service-tag {
            background: rgba(255, 107, 157, 0.15);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .master-card-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .master-card-price {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
        }

        /* ============ ФИЛЬТРЫ ============ */
        .filters-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            padding: 1rem 5%;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
            border-radius: var(--radius);
        }

        @media (max-width: 480px) {
            .filters-bar { padding: 0.8rem 1rem; gap: 0.5rem; }
            .filter-input { width: 100%; }
            .filter-select { min-width: 0; flex: 1; font-size: 0.8rem; padding: 8px 12px; }
        }

        .filter-select,
        .filter-input {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 50px;
            color: var(--light);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
        }

        .filter-input { width: 200px; }
        .filter-input::placeholder { color: var(--gray); }
        .filter-select { min-width: 180px; }
        .filter-select option { background: var(--dark); color: var(--light); }

        /* ============ ДЕТАЛИ МАСТЕРА ============ */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 3rem;
            padding: 2rem 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .detail-grid { grid-template-columns: 1fr; gap: 2rem; padding: 1rem; }
        }

        .detail-photo-container {
            width: 100%;
            aspect-ratio: 1;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .detail-photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-photo-container .placeholder-icon {
            font-size: 8rem;
            color: var(--gray);
        }

        .detail-mini-map {
            width: 100%;
            height: 200px;
            border-radius: var(--radius);
            border: 1px solid var(--card-border);
            margin-top: 1.5rem;
            background: var(--card-bg);
        }

        .detail-info h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        @media (max-width: 480px) {
            .detail-info h1 { font-size: 1.6rem; }
        }

        .detail-info .own-profile-badge {
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: 400;
        }

        .detail-spec { color: var(--primary); font-size: 1.1rem; font-weight: 500; margin-bottom: 1rem; }
        .detail-rating { color: var(--warning); font-size: 1.2rem; margin-bottom: 1rem; }
        .detail-price { font-size: 2rem; font-weight: 700; color: var(--accent); margin: 1rem 0; }
        .detail-address { color: var(--gray); display: flex; align-items: center; gap: 6px; }
        .detail-services { display: flex; flex-wrap: wrap; gap: 8px; margin: 1rem 0; }
        .detail-services .service-tag { font-size: 0.9rem; padding: 8px 16px; }
        .detail-desc { color: var(--gray); line-height: 1.8; margin: 1rem 0; }
        .detail-schedule { background: var(--card-bg); border-radius: var(--radius); padding: 1.5rem; margin: 1.5rem 0; }
        .detail-schedule h4 { margin-bottom: 1rem; }
        .schedule-day { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--card-border); }
        .schedule-day:last-child { border: none; }

        /* ============ ПОРТФОЛИО В ДЕТАЛЯХ ============ */
        .portfolio-section { margin: 1.5rem 0; }
        .portfolio-section h4 { margin-bottom: 1rem; color: var(--primary); }
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
        @media (max-width: 480px) { .portfolio-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); } }
        .portfolio-item { aspect-ratio: 1; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--card-border); cursor: pointer; transition: 0.3s; background: var(--card-bg); }
        .portfolio-item:hover { transform: scale(1.05); border-color: var(--primary); }
        .portfolio-item img { width: 100%; height: 100%; object-fit: cover; }

        /* ============ СЛОТЫ ДЛЯ ЗАПИСИ ============ */
        .booking-section { margin-top: 2rem; }
        .booking-section h3 { margin-bottom: 1rem; }
        .booking-date-input { width: 100%; padding: 12px; border-radius: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--card-border); color: white; font-family: 'Inter', sans-serif; margin: 1rem 0; }
        .slots-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1rem; }

                const geoObjects = data.response.GeoObjectCollection.featureMember;
                if (geoObjects && geoObjects.length > 0) {
                    const pos = geoObjects[0].GeoObject.Point.pos;
                    const [lon, lat] = pos.split(' ').map(Number);
                    return [lat, lon]; // Возвращаем [широта, долгота]
                }
                return null;
            } catch (e) {
                console.error('Ошибка геокодирования через HTTP API:', e.message);
                return null;
            }
        }

        // ============ ИНИЦИАЛИЗАЦИЯ КАРТЫ ============
        async function initMap() {
            console.log('🗺️ Инициализация карты...');
            
            const mapContainer = document.getElementById('yandexMap');
            if (!mapContainer) {
                console.error('❌ Контейнер карты не найден');
                return;
            }

            if (currentView !== 'map') return;

            // Загружаем мастеров если ещё нет
            if (allMasters.length === 0) {
                try {
                    const snap = await getDocs(query(collection(db, 'masters'), where('active', '==', true)));
                    allMasters = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    console.log('📊 Загружено мастеров для карты:', allMasters.length);
                } catch (e) {
                    console.error('Ошибка загрузки мастеров:', e);
                }
            }

            // Ждём загрузки API Яндекс.Карт
            if (typeof ymaps === 'undefined') {
                console.log('⏳ Ожидание загрузки API Яндекс.Карт...');
                setTimeout(initMap, 500);
                return;
            }

            ymaps.ready(() => {
                console.log('✅ API Яндекс.Карт готов');
                
                // Скрываем оверлей загрузки
                const overlay = document.getElementById('mapLoadingOverlay');
                if (overlay) overlay.classList.add('hidden');

                // Если карта уже создана — обновляем
                if (yandexMap) {
                    yandexMap.destroy();
                    mapPlacemarks = {};
                }

                // Создаём карту
                yandexMap = new ymaps.Map('yandexMap', {
                    center: [55.751244, 37.618423], // Москва
                    zoom: 10,
                    controls: ['zoomControl', 'searchControl', 'typeSelector']
                });

                console.log('🗺️ Карта создана');

                // Добавляем метки мастеров на карту
                addMastersToMap();
            });
        }

        // ============ ДОБАВЛЕНИЕ МАСТЕРОВ НА КАРТУ ============
        async function addMastersToMap() {
            if (!yandexMap) {
                console.error('❌ Карта не инициализирована');
                return;
            }

            console.log('📍 Добавляем метки мастеров на карту...');

            // Очищаем старые метки
            Object.values(mapPlacemarks).forEach(p => {
                if (p && yandexMap) yandexMap.geoObjects.remove(p);
            });
            mapPlacemarks = {};

            // Применяем фильтры
            let mastersToShow = allMasters.filter(m => m.active);
            if (currentQuickFilter !== 'all') {
                mastersToShow = mastersToShow.filter(m => 
                    (m.specialization || '').includes(currentQuickFilter) || 
                    (m.services || []).includes(currentQuickFilter)
                );
            }
            
            const searchQuery = document.getElementById('homeSearchInput')?.value?.toLowerCase();
            if (searchQuery) {
                mastersToShow = mastersToShow.filter(m => 
                    (m.name || '').toLowerCase().includes(searchQuery) || 
                    (m.address || '').toLowerCase().includes(searchQuery) ||
                    (m.specialization || '').toLowerCase().includes(searchQuery)
                );
            }

            const mastersWithAddress = mastersToShow.filter(m => m.address && m.address.trim().length > 0);
            console.log('📍 Мастеров с адресом:', mastersWithAddress.length);

            if (mastersWithAddress.length === 0) {
                console.log('⚠️ Нет мастеров с адресом для отображения на карте');
                return;
            }

            // Геокодируем адреса через HTTP API и добавляем метки
            for (const master of mastersWithAddress) {
                const coords = await geocodeAddress(master.address);
                if (coords) {
                    addMasterPlacemark(master, coords);
                    console.log('✅ Метка добавлена:', master.name, coords);
                } else {
                    console.log('⚠️ Не удалось найти координаты для:', master.address);
                }
            }

            // Подгоняем область показа карты под все метки
            if (Object.keys(mapPlacemarks).length > 0) {
                const bounds = yandexMap.geoObjects.getBounds();
                if (bounds) {
                    yandexMap.setBounds(bounds, {
                        checkZoomRange: true,
                        zoomMargin: 50
                    });
                }
            }
        }

        // ============ ПЕРЕКЛЮЧЕНИЕ КАРТА / СПИСОК ============

        async function loadMastersPage() {
            const grid = document.getElementById('mastersGridPage');
            if (!grid) return;

            grid.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Загрузка...</p></div>';

            try {
                const snap = await getDocs(query(collection(db, 'masters'), where('active', '==', true)));
                allMasters = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                
                const search = (document.getElementById('searchMasterInput')?.value || '').toLowerCase();
                const spec = document.getElementById('filterSpec')?.value || '';
                const sort = document.getElementById('sortMasters')?.value || 'rating';
                
                let filtered = [...allMasters];
                if (search) filtered = filtered.filter(m => (m.name || '').toLowerCase().includes(search) || (m.address || '').toLowerCase().includes(search));
                if (spec) filtered = filtered.filter(m => (m.specialization || '').includes(spec) || (m.services || []).includes(spec));
                if (sort === 'price_asc') filtered.sort((a, b) => (a.priceFrom || 9999) - (b.priceFrom || 9999));
                else if (sort === 'price_desc') filtered.sort((a, b) => (b.priceFrom || 0) - (a.priceFrom || 0));
                else filtered.sort((a, b) => (b.rating || 5) - (a.rating || 5));
                
                if (!filtered.length) {
                    grid.innerHTML = '<div class="empty-state"><i class="fas fa-user-slash"></i><p>Мастеров не найдено</p></div>';
                    return;
                }
                
                grid.innerHTML = filtered.map(m => renderMasterCard(m)).join('');

                grid.innerHTML = '<div class="empty-state"><p>Ошибка загрузки</p></div>';
            }
        }

                }, {

        // ============ ЗАГРУЗКА ДОСТУПНЫХ СЛОТОВ ============
        window.loadSlots = async (masterId) => {
            console.log('🕐 Загружаем слоты для мастера:', masterId, 'на дату:', selectedDate);
            
            const container = document.getElementById('slotsContainer');
            const confirmBtn = document.getElementById('confirmBtn');
            
            if (!container) {
                console.error('❌ slotsContainer не найден');
                return;
            }

            container.innerHTML = '<p style="color:var(--gray);">Загрузка слотов...</p>';
            selectedSlot = null;
            if (confirmBtn) confirmBtn.style.display = 'none';

            try {
                // Получаем данные мастера
                const master = currentMaster || (await getDoc(doc(db, 'masters', masterId))).data();
                
                if (!master || !master.schedule) {
                    container.innerHTML = '<p style="color:var(--gray);">Расписание не настроено</p>';
                    return;
                }

                // Определяем день недели для выбранной даты
                const daysMap = ['ВС', 'ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ'];
                const date = new Date(selectedDate);
                const dayKey = daysMap[date.getDay()];
                const daySchedule = master.schedule[dayKey];

                if (!daySchedule || !daySchedule.enabled) {
                    container.innerHTML = '<p style="color:var(--gray);">В этот день мастер не работает</p>';
                    return;
                }

                // Генерируем слоты с шагом 30 минут
                const slots = [];
                const startHour = parseInt(daySchedule.start.split(':')[0]) || 9;
                const endHour = parseInt(daySchedule.end.split(':')[0]) || 18;

                for (let hour = startHour; hour < endHour; hour++) {
                    slots.push(`${String(hour).padStart(2, '0')}:00`);
                    slots.push(`${String(hour).padStart(2, '0')}:30`);
                }

                // Проверяем занятые слоты в базе
                const bookingsQuery = query(
                    collection(db, 'bookings'),
                    where('masterId', '==', masterId),
                    where('date', '==', selectedDate),
                    where('status', 'in', ['new', 'confirmed'])
                );
                const bookingsSnapshot = await getDocs(bookingsQuery);
                const bookedSlots = bookingsSnapshot.docs.map(doc => doc.data().time);
                
                console.log('📅 Занятые слоты:', bookedSlots);

                // Рендерим слоты

            // Выделяем выбранный слот
            buttonElement.classList.add('selected');
            
            // Показываем кнопку подтверждения

            if (confirmBtn) confirmBtn.style.display = 'flex';

                window.toast('Войдите для записи');
                window.showPage('auth');
                return;
            }
            
            // Проверяем выбор слота
            if (!selectedSlot) {
                window.toast('Выберите время для записи');
                return;
            }

            try {
                // Создаём запись в Firestore
                await addDoc(collection(db, 'bookings'), {
                    masterId: masterId,
                    clientId: currentUser.uid,
                    clientName: userProfile?.name || currentUser.displayName || 'Клиент',
                    clientEmail: currentUser.email,
                    date: selectedDate,
                    time: selectedSlot,
                    status: 'new',
                    createdAt: serverTimestamp()
                });

                window.loadSlots(masterId);

        // ============ АВТОРИЗАЦИЯ ЧЕРЕЗ EMAIL ============
        window.emailAuth = async (mode) => {
            const emailInput = document.getElementById('authEmail');
            const passInput = document.getElementById('authPass');
            const roleInput = document.getElementById('authRole');
            
            const email = emailInput?.value?.trim();
            const password = passInput?.value?.trim();
            const role = roleInput?.value || 'client';

            // Валидация
            if (!email || !password) {
                window.toast('Заполните все поля');
                return;
            }
            if (password.length < 6) {
                window.toast('Пароль должен быть минимум 6 символов');
                return;
            }

            try {
                if (mode === 'register') {
                    // ===== РЕГИСТРАЦИЯ =====
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(userCredential.user, { 
                        displayName: email.split('@')[0] 
                    });
                    
                    // Сохраняем пользователя в Firestore
                    await setDoc(doc(db, 'users', userCredential.user.uid), {
                        email: email,
                        role: role,
                        name: email.split('@')[0],
                        createdAt: serverTimestamp()
                    });

                    // Если регистрируется как мастер — создаём профиль мастера
                    if (role === 'master') {
                        await setDoc(doc(db, 'masters', userCredential.user.uid), {
                            userId: userCredential.user.uid,
                            name: email.split('@')[0],
                            active: false,
                            services: ['Маникюр'],
                            priceFrom: 800,
                            rating: 5,
                            reviewCount: 0,
                            specialization: '',
                            address: '',
                            phone: '',
                            description: '',
                            photoURL: '',
                            portfolio: [],
                            schedule: {
                                'ПН': { enabled: true, start: '09:00', end: '18:00' },
                                'ВТ': { enabled: true, start: '09:00', end: '18:00' },
                                'СР': { enabled: true, start: '09:00', end: '18:00' },
                                'ЧТ': { enabled: true, start: '09:00', end: '18:00' },
                                'ПТ': { enabled: true, start: '09:00', end: '18:00' },
                                'СБ': { enabled: false, start: '09:00', end: '18:00' },
                                'ВС': { enabled: false, start: '09:00', end: '18:00' }
                            },
                            createdAt: serverTimestamp()
                        });
                        window.toast('✅ Профиль мастера создан! Настройте его в Кабинете.');
                    } else {
                        window.toast('✅ Регистрация успешна!');
                    }
                } else {
                    // ===== ВХОД =====
                    await signInWithEmailAndPassword(auth, email, password);
                    window.toast('✅ Вход выполнен!');
                }

                window.showPage('home');

            } catch (error) {
                console.error('❌ Ошибка авторизации:', error);
                
                let errorMessage = 'Ошибка авторизации';
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'Этот email уже занят';
                } else if (error.code === 'auth/invalid-credential') {
                    errorMessage = 'Неверный email или пароль';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Пароль слишком простой';
                } else {
                    errorMessage = error.message;
                }
                
                window.toast('❌ ' + errorMessage);
            }
        };

        // ============ ВХОД ЧЕРЕЗ GOOGLE ============
        window.signInWithGoogle = async () => {
            try {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // Проверяем, существует ли профиль пользователя
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (!userDoc.exists()) {
                    // Создаём профиль для нового Google-пользователя
                    await setDoc(doc(db, 'users', user.uid), {
                        email: user.email,
                        role: 'client',
                        name: user.displayName || user.email?.split('@')[0],
                        photoURL: user.photoURL,
                        createdAt: serverTimestamp()
                    });
                    console.log('✅ Создан новый профиль через Google');
                }

                window.toast('✅ Вход через Google успешен!');
                window.showPage('home');

            } catch (error) {
                console.error('❌ Ошибка Google входа:', error);
                
                if (error.code === 'auth/unauthorized-domain') {
                    window.toast('❌ Добавьте домен в Authorized domains в Firebase Console');
                } else if (error.code === 'auth/user-cancelled') {
                    window.toast('Вы отменили вход через Google');
                } else {
                    window.toast('❌ Ошибка входа через Google');
                }
            }
        };

        // ============ ФУНКЦИИ ЗАГРУЗКИ ФОТО ============
        window.handleProfilePhotoUpload = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                tempProfilePhoto = e.target.result;
                
                const preview = document.getElementById('profilePhotoPreview');
                if (preview) {
                    preview.src = tempProfilePhoto;
                    preview.style.display = 'block';
                }
                
                const placeholder = document.getElementById('profilePhotoPlaceholder');
                if (placeholder) {
                    placeholder.style.display = 'none';
                }
            };
            reader.readAsDataURL(file);
        };

        window.handlePortfolioUpload = (event) => {
            const files = event.target.files;
            if (!files.length) return;
            
            for (const file of files) {
                if (tempPortfolioPhotos.length >= 5) {
                    window.toast('Максимум 5 фото в портфолио');
                    break;
                }
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    tempPortfolioPhotos.push(e.target.result);
                    renderPortfolioPreview();
                };
                reader.readAsDataURL(file);
            }
            
            // Очищаем input чтобы можно было загрузить те же файлы повторно
            event.target.value = '';
        };

        window.removePortfolioPhoto = (index) => {
            tempPortfolioPhotos.splice(index, 1);
            renderPortfolioPreview();
        };

                    <img src="${img}">
                    <button class="remove-btn" onclick="window.removePortfolioPhoto(${i})">✕</button>
                </div>
            `).join('') + (tempPortfolioPhotos.length < 5 ? 
                `<div class="portfolio-add-btn" onclick="document.getElementById('portfolioFileInput').click()">
                    <i class="fas fa-plus"></i>
                </div>` : '');

        // ============ ЗАГРУЗКА КАБИНЕТА ============

                    // ===== ВКЛАДКА ЗАПИСЕЙ =====
                    else if (tabName === 'bookings') {
                        tabContent.innerHTML = `
                            <h3>Записи клиентов</h3>
                            ${bookings.length === 0 ? 
                                '<p style="color:var(--gray);padding:2rem 0;">У вас пока нет записей. Когда клиенты начнут записываться, они появятся здесь.</p>' 
                                : 
                                bookings.map(booking => `
                                    <div class="booking-item">
                                        <div class="booking-item-info">
                                            <strong>${booking.clientName || 'Клиент'}</strong>
                                            <span class="booking-date-time">📅 ${booking.date} в ${booking.time}</span>
                                            <span class="booking-email">${booking.clientEmail || ''}</span>
                                        </div>
                                        <div class="booking-item-actions">
                                            <span class="badge badge-${booking.status}">
                                                ${booking.status === 'new' ? 'Новая' : 
                                                  booking.status === 'confirmed' ? 'Подтверждена' : 'Отменена'}
                                            </span>
                                            ${booking.status === 'new' ? `
                                                <button class="btn btn-sm btn-success" 
                                                        onclick="updateBookingStatus('${booking.id}', 'confirmed')">
                                                    ✓ Принять
                                                </button>
                                                <button class="btn btn-sm btn-danger" 
                                                        onclick="updateBookingStatus('${booking.id}', 'cancelled')">
                                                    ✕ Отклонить
                                                </button>
                                            ` : ''}
                                        </div>
                                    </div>
                                `).join('')
                            }
                        `;
                    }

                    // ===== ВКЛАДКА ПРЕДПРОСМОТРА =====
                    else if (tabName === 'preview') {
                        tabContent.innerHTML = `
                            <h3>Предпросмотр профиля</h3>
                            <p style="color:var(--gray);margin-bottom:1.5rem;">
                                Так вашу карточку видят клиенты
                            </p>
                            
                            <div class="master-card preview-card">
                                <div class="master-card-img">
                                    ${tempProfilePhoto ? 
                                        `<img src="${tempProfilePhoto}" alt="${masterData.name}">` : 
                                        '<i class="fas fa-user-circle placeholder-icon"></i>'
                                    }
                                    <div class="master-card-badge">
                                        ★ ${(masterData.rating || 5).toFixed(1)}
                                    </div>
                                </div>
                                <div class="master-card-body">
                                    <div class="master-card-name">${masterData.name || 'Ваше имя'}</div>
                                    <div class="master-card-spec">${masterData.specialization || 'Специализация'}</div>
                                    <div class="master-card-address">
                                        <i class="fas fa-map-marker-alt"></i> ${masterData.address || 'Адрес'}
                                    </div>
                                    <div class="master-card-services">
                                        ${(masterData.services || []).slice(0, 3).map(service => 
                                            `<span class="service-tag">${service}</span>`
                                        ).join('')}
                                    </div>
                                    <div class="master-card-footer">
                                        <div class="master-card-price">
                                            от ${masterData.priceFrom || 800} ₽
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <button class="btn btn-outline" 
                                    onclick="window.showMasterDetail('${currentUser.uid}')" 
                                    style="margin-top:1rem;">
                                <i class="fas fa-external-link-alt"></i> Открыть полный просмотр
                            </button>
                        `;
                    }
                };

                // Загружаем первую вкладку (профиль)
                window.switchTab('profile');

            } else {
                // ============ КАБИНЕТ КЛИЕНТА ============
                const bookingsQuery = query(
                    collection(db, 'bookings'),
                    where('clientId', '==', currentUser.uid),
                    orderBy('createdAt', 'desc'),
                    limit(50)
                );
                const bookingsSnapshot = await getDocs(bookingsQuery);
                const bookings = bookingsSnapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));

                container.innerHTML = `
                    <h2 style="margin-bottom:2rem;">👋 Мои записи</h2>
                    
                    ${bookings.length === 0 ? `
                        <div class="empty-state">
                            <i class="fas fa-calendar-plus"></i>
                            <p>У вас пока нет записей</p>
                            <button class="btn" onclick="showPage('masters')" style="margin-top:1rem;">
                                <i class="fas fa-search"></i> Найти мастера
                            </button>
                        </div>
                    ` : `
                        <div style="display:grid; gap:1rem; max-width:800px;">
                            ${bookings.map(booking => `
                                <div style="background:var(--dark-card); padding:1.5rem; border-radius:var(--radius-lg); 
                                            border:1px solid var(--card-border);">
                                    <div style="display:flex; justify-content:space-between; align-items:center; 
                                                flex-wrap:wrap; gap:1rem;">
                                        <div>
                                            <strong>${booking.clientName || 'Вы'}</strong><br>
                                            <span style="color:var(--primary);">📅 ${booking.date} в ${booking.time}</span><br>
                                            <small style="color:var(--gray);">Мастер ID: ${booking.masterId?.slice(0, 8)}...</small>
                                        </div>
                                        <span class="badge badge-${booking.status}">
                                            ${booking.status === 'new' ? 'Ожидает подтверждения' : 
                                              booking.status === 'confirmed' ? 'Подтверждена ✅' : 'Отменена ❌'}
                                        </span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `}
                `;
            }
        }

        // ============ СОХРАНЕНИЕ ПРОФИЛЯ МАСТЕРА ============
        window.saveMasterProfile = async () => {
            console.log('💾 Сохраняем профиль мастера...');
            
            const profileData = {
                name: document.getElementById('mName')?.value || '',
                specialization: document.getElementById('mSpec')?.value || '',
                address: document.getElementById('mAddr')?.value || '',
                priceFrom: Number(document.getElementById('mPrice')?.value) || 800,
                phone: document.getElementById('mPhone')?.value || '',
                description: document.getElementById('mDesc')?.value || '',
                services: (document.getElementById('mServ')?.value || '')
                    .split(',')
                    .map(s => s.trim())
                    .filter(Boolean),
                photoURL: tempProfilePhoto || '',
                portfolio: tempPortfolioPhotos,
                active: document.getElementById('mActive')?.checked || false,
                userId: currentUser.uid
            };

            console.log('📤 Отправляем данные:', profileData);

            try {
                await setDoc(doc(db, 'masters', currentUser.uid), profileData, { merge: true });
                
                // Показываем статус сохранения
                const profileStatusEl = document.getElementById('profileStatus');
                if (profileStatusEl) {
                    profileStatusEl.style.display = 'block';
                    setTimeout(() => { profileStatusEl.style.display = 'none'; }, 3000);
                }
                
                const portfolioStatusEl = document.getElementById('portfolioStatus');
                if (portfolioStatusEl) {
                    portfolioStatusEl.style.display = 'block';
                    setTimeout(() => { portfolioStatusEl.style.display = 'none'; }, 3000);
                }
                
                window.toast('✅ Профиль сохранён!');
                console.log('✅ Профиль успешно сохранён в Firestore');

                // Обновляем карту если на главной
                if (document.getElementById('homePage').classList.contains('active')) {
                    const snap = await getDocs(query(collection(db, 'masters'), where('active', '==', true)));
                    allMasters = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (currentView === 'map') initMap();
                }
            } catch (error) {
                console.error('❌ Ошибка сохранения профиля:', error);
                window.toast('❌ Ошибка сохранения: ' + error.message);
            }
        };

        // ============ СОХРАНЕНИЕ РАСПИСАНИЯ ============
        window.saveSchedule = async () => {
            console.log('💾 Сохраняем расписание...');
            
            const days = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ', 'ВС'];
            const schedule = {};

            days.forEach(day => {
                const checkbox = document.querySelector(`.schedule-checkbox[data-day="${day}"]`);
                const startInput = document.querySelector(`.schedule-start[data-day="${day}"]`);
                const endInput = document.querySelector(`.schedule-end[data-day="${day}"]`);
                
                schedule[day] = {
                    enabled: checkbox?.checked || false,
                    start: startInput?.value || '09:00',
                    end: endInput?.value || '18:00'
                };
            });

            console.log('📤 Отправляем расписание:', schedule);

            try {
                await updateDoc(doc(db, 'masters', currentUser.uid), { schedule });
                
                // Показываем статус сохранения
                const statusEl = document.getElementById('scheduleStatus');
                if (statusEl) {
                    statusEl.style.display = 'block';
                    setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
                }
                
                window.toast('✅ Расписание сохранено!');
                console.log('✅ Расписание успешно сохранено в Firestore');
            } catch (error) {
                console.error('❌ Ошибка сохранения расписания:', error);
                window.toast('❌ Ошибка сохранения: ' + error.message);
            }
        };

        // ============ ОБНОВЛЕНИЕ СТАТУСА ЗАПИСИ ============
        window.updateBookingStatus = async (bookingId, newStatus) => {
            console.log(`🔄 Обновление записи ${bookingId} → ${newStatus}`);
            
            try {
                await updateDoc(doc(db, 'bookings', bookingId), { status: newStatus });
                
                const message = newStatus === 'confirmed' 
                    ? '✅ Запись подтверждена! Клиент будет рад.' 
                    : '❌ Запись отклонена';
                window.toast(message);
                
                // Перезагружаем кабинет
                loadCabinet();
            } catch (error) {
                console.error('❌ Ошибка обновления статуса:', error);
                window.toast('❌ Ошибка: ' + error.message);
            }
        };

        // ============ ОТСЛЕЖИВАНИЕ АВТОРИЗАЦИИ (с восстановлением страницы) ============
        onAuthStateChanged(auth, async (user) => {
            console.log('🔄 Состояние авторизации изменилось:', user ? 'вошёл' : 'вышел');
            
            currentUser = user;
            
            const authButton = document.getElementById('authNavBtn');
            const userDropdown = document.getElementById('userDropdown');
            const userNameDisplay = document.getElementById('userDisplayName');
            const cabinetNavItem = document.getElementById('cabinetNavItem');

            if (user) {
                // Пользователь авторизован
                if (!userProfile) {
                    const userDoc = await getDoc(doc(db, 'users', user.uid));
                    if (userDoc.exists()) {
                        userProfile = userDoc.data();
                    } else {
                        // Создаём профиль если его нет (для Google-пользователей)
                        userProfile = {
                            email: user.email,
                            role: 'client',
                            name: user.displayName || user.email?.split('@')[0],
                            photoURL: user.photoURL,
                            createdAt: new Date()
                        };
                        await setDoc(doc(db, 'users', user.uid), {
                            ...userProfile,
                            createdAt: serverTimestamp()
                        });
                        console.log('✅ Автосоздан профиль для:', user.email);
                    }
                }

                // Обновляем UI
                userNameDisplay.textContent = userProfile?.name || user.displayName || user.email?.split('@')[0] || 'Я';
                userDropdown.style.display = 'block';
                authButton.style.display = 'none';
                cabinetNavItem.style.display = 'block';

            } else {
                // Пользователь вышел
                userProfile = null;
                userDropdown.style.display = 'none';
                authButton.style.display = 'inline-block';
                cabinetNavItem.style.display = 'none';
            }

            // ===== ВАЖНО: Восстанавливаем страницу из hash =====
            if (!isInitialized) {
                isInitialized = true;
                const hash = window.location.hash.replace('#', '') || 'home';
                console.log('🔄 Первый запуск, восстанавливаем страницу из hash:', hash);
                
                // Не показываем страницу auth если пользователь авторизован
                if (hash === 'auth' && currentUser) {
                    activatePage('cabinet');
                } else {
                    activatePage(hash);
                }
            }
        });

        // ============ ЗАПУСК ПРИЛОЖЕНИЯ ============
        console.log('🚀 NailMasterGo полностью готов к работе');
        console.log('🖼️ Фоновые изображения: ПК и мобильная версия');
        console.log('🗺️ Карта Яндекс с HTTP Геокодером');
        console.log('📸 Загрузка фото профиля и портфолио через кнопку');
        console.log('🔍 Современный поиск 2026 с чипсами-фильтрами');
        console.log('📱 Адаптивный дизайн для мобильных устройств');
        console.log('💡 Зарегистрируйтесь как "мастер" чтобы создать профиль');
        console.log('💡 Зарегистрируйтесь как "клиент" чтобы записываться');
        console.log('💡 Добавьте домен dbv01.github.io в Authorized domains (Authentication → Settings)');
        console.log('🔗 Текущая страница сохраняется в URL (hash) — при перезагрузке восстановится');
    </script>

</body>
</html>
