<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>NailMasterGo — бронирование мастеров ногтевого сервиса</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💅</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #FF6B9D; --primary-dark: #E5507A; --secondary: #6C5CE7; --accent: #00CEC9;
      --light: #FFFFFF; --dark: #1A1A2E; --dark-card: rgba(26, 26, 46, 0.9); --gray: #A0A0B0;
      --card-bg: rgba(255, 255, 255, 0.03); --card-border: rgba(255, 255, 255, 0.08);
      --gradient: linear-gradient(135deg, #FF6B9D 0%, #6C5CE7 100%);
      --success: #00CEC9; --error: #FF7675; --warning: #FDCB6E; --radius: 16px; --radius-lg: 24px;
    }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #1A1A2E 0%, #16213E 100%); color: var(--light); line-height: 1.6; overflow-x: hidden; }
    .page { display: none !important; padding-top: 80px; min-height: 100vh; animation: fadeIn 0.4s ease; }
    .page.active { display: block !important; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .navbar {
      position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 5%; background: rgba(26, 26, 46, 0.95); backdrop-filter: blur(20px); z-index: 1000;
      border-bottom: 1px solid var(--card-border); height: 70px;
    }
    .logo { font-size: 1.8rem; font-weight: 800; cursor: pointer; }
    .logo span { color: var(--primary); }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; align-items: center; }
    .nav-link { color: var(--gray); font-weight: 500; cursor: pointer; background: none; border: none; font-size: 0.95rem; transition: 0.3s; position: relative; padding: 0.5rem 0; }
    .nav-link::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 2px; background: var(--gradient); transition: 0.3s; }
    .nav-link:hover::after, .nav-link.active::after { width: 100%; }
    .nav-link:hover, .nav-link.active { color: var(--primary); }
    .mobile-menu-btn { display: none; background: none; border: none; color: var(--light); font-size: 1.8rem; cursor: pointer; }
    @media (max-width: 768px) {
      .nav-links { position: fixed; top: 70px; left: 0; width: 100%; background: rgba(26,26,46,0.98); flex-direction: column; padding: 2rem; transform: translateY(-100%); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 999; gap: 1rem; }
      .nav-links.active { transform: translateY(0); opacity: 1; visibility: visible; }
      .mobile-menu-btn { display: block; }
    }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--gradient); color: white; padding: 12px 28px; border-radius: 50px; font-weight: 600; transition: 0.3s; border: none; cursor: pointer; font-size: 1rem; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255,107,157,0.3); }
    .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
    .btn-outline:hover { background: var(--primary); color: white; }
    .btn-sm { padding: 8px 16px; font-size: 0.85rem; }
    .btn-block { width: 100%; }
    .btn-danger { background: var(--error); }
    .btn-success { background: var(--success); }
    .section-title { font-family: 'Playfair Display', serif; font-size: 2.8rem; text-align: center; margin: 2rem 0; background: linear-gradient(135deg, #FF6B9D, #6C5CE7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    @media (max-width: 768px) { .section-title { font-size: 2rem; } }
    .map-container { width: 100%; height: 400px; background: var(--card-bg); border-radius: var(--radius-lg); margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; color: var(--gray); border: 1px solid var(--card-border); }
    .masters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; padding: 1rem 5%; }
    @media (max-width: 768px) { .masters-grid { grid-template-columns: 1fr; padding: 1rem; } }
    .master-card { background: var(--dark-card); backdrop-filter: blur(15px); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--card-border); cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; }
    .master-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); border-color: var(--primary); }
    .master-card-img { width: 100%; height: 240px; object-fit: cover; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; position: relative; }
    .master-card-img img { width: 100%; height: 100%; object-fit: cover; }
    .master-card-badge { position: absolute; top: 16px; left: 16px; background: var(--gradient); color: white; padding: 6px 14px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; }
    .master-card-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
    .master-card-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.3rem; }
    .master-card-spec { color: var(--primary); font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem; }
    .master-card-address { color: var(--gray); font-size: 0.85rem; margin-bottom: 0.5rem; }
    .master-card-services { display: flex; flex-wrap: wrap; gap: 6px; margin: 0.8rem 0; }
    .service-tag { background: rgba(255,107,157,0.15); color: var(--primary); padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; }
    .master-card-footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; }
    .master-card-price { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    .filters-bar { display: flex; gap: 1rem; flex-wrap: wrap; padding: 1rem 5%; align-items: center; background: rgba(0,0,0,0.2); margin-bottom: 2rem; }
    .filter-select, .filter-input { padding: 10px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); border-radius: 50px; color: var(--light); font-size: 0.9rem; font-family: 'Inter', sans-serif; }
    .filter-input { width: 200px; }
    .filter-select { min-width: 180px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 3rem; padding: 2rem 5%; max-width: 1200px; margin: 0 auto; }
    @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } }
    .detail-info h1 { font-size: 2.2rem; font-weight: 700; }
    .detail-spec { color: var(--primary); font-size: 1.1rem; }
    .detail-price { font-size: 2rem; font-weight: 700; color: var(--accent); margin: 1rem 0; }
    .detail-schedule { background: var(--card-bg); border-radius: var(--radius); padding: 1.5rem; margin: 1.5rem 0; }
    .schedule-day { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--card-border); }
    .slots-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1rem; }
    .slot-btn { padding: 10px 18px; border-radius: 50px; border: 1px solid var(--card-border); background: rgba(255,255,255,0.03); color: var(--light); cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
    .slot-btn:hover:not(.booked) { border-color: var(--primary); background: rgba(255,107,157,0.1); }
    .slot-btn.booked { background: rgba(255,255,255,0.03); color: var(--gray); cursor: not-allowed; text-decoration: line-through; }
    .slot-btn.selected { background: var(--gradient); border-color: transparent; color: white; }
    .cabinet-layout { display: grid; grid-template-columns: 250px 1fr; gap: 2rem; padding: 2rem 5%; max-width: 1400px; margin: 0 auto; }
    @media (max-width: 768px) { .cabinet-layout { grid-template-columns: 1fr; } }
    .cabinet-sidebar { background: var(--dark-card); border-radius: var(--radius-lg); padding: 1.5rem; border: 1px solid var(--card-border); height: fit-content; }
    .cabinet-sidebar button { display: block; width: 100%; text-align: left; padding: 12px 16px; background: none; border: none; color: var(--gray); cursor: pointer; border-radius: 12px; transition: 0.2s; font-size: 0.95rem; margin-bottom: 4px; }
    .cabinet-sidebar button:hover, .cabinet-sidebar button.active { background: rgba(255,107,157,0.1); color: var(--primary); }
    .cabinet-content { background: var(--dark-card); border-radius: var(--radius-lg); padding: 2rem; border: 1px solid var(--card-border); }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--light); font-weight: 500; font-size: 0.9rem; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); border-radius: 12px; color: var(--light); font-size: 1rem; font-family: 'Inter', sans-serif; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(5px); }
    .modal-box { background: var(--dark-card); border-radius: var(--radius-lg); max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 32px; border: 1px solid var(--card-border); }
    .modal-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--primary); }
    .toast { position: fixed; bottom: 30px; right: 30px; background: var(--gradient); color: white; padding: 1rem 1.8rem; border-radius: 50px; z-index: 3000; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .footer { background: rgba(0,0,0,0.3); padding: 2rem 5%; text-align: center; margin-top: 4rem; border-top: 1px solid var(--card-border); color: var(--gray); }
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--gray); }
    .empty-state i { font-size: 4rem; margin-bottom: 1rem; color: var(--primary); }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 0.8rem; font-weight: 600; }
    .badge-new { background: rgba(108,92,231,0.2); color: #a29bfe; }
    .badge-confirmed { background: rgba(0,206,201,0.2); color: #00CEC9; }
    .badge-cancelled { background: rgba(255,118,117,0.2); color: #FF7675; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo" onclick="showPage('home')"><span>Nail</span>MasterGo</div>
  <button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
  <ul class="nav-links" id="navLinks">
    <li><button class="nav-link active" onclick="showPage('home')">Главная</button></li>
    <li><button class="nav-link" onclick="showPage('masters')">Мастера</button></li>
    <li id="cabinetNavItem" style="display:none"><button class="nav-link" onclick="showPage('cabinet')">Кабинет</button></li>
    <li><button class="nav-link" id="authNavBtn" onclick="showPage('auth')">Войти</button></li>
  </ul>
</nav>

<section id="homePage" class="page active">
  <div style="padding: 2rem 5%;">
    <h1 class="section-title">Найдите идеального мастера маникюра</h1>
    <div class="map-container" id="mapPlaceholder">
      <div style="text-align:center"><i class="fas fa-map-marked-alt" style="font-size:4rem; color:var(--primary); margin-bottom:1rem;"></i><h3>🗺️ Карта мастеров</h3><p>Подключите API Яндекс.Карт</p></div>
    </div>
    <div style="display:flex; gap:1rem; justify-content:center; margin:2rem 0;">
      <button class="btn" onclick="showPage('masters')">Все мастера</button>
      <button class="btn btn-outline" onclick="showPage('auth')">Стать мастером</button>
    </div>
  </div>
</section>

<section id="mastersPage" class="page">
  <div style="padding: 2rem 5%;">
    <h2 class="section-title">Наши мастера</h2>
    <div class="filters-bar">
      <input type="text" class="filter-input" placeholder="🔍 Поиск..." id="searchMasterInput" oninput="loadMasters()">
      <select class="filter-select" id="sortMasters" onchange="loadMasters()">
        <option value="rating">По рейтингу</option>
        <option value="price_asc">Цена: низкая</option>
        <option value="price_desc">Цена: высокая</option>
      </select>
      <select class="filter-select" id="filterSpec" onchange="loadMasters()">
        <option value="">Все</option>
        <option value="Маникюр">Маникюр</option>
        <option value="Педикюр">Педикюр</option>
        <option value="Наращивание">Наращивание</option>
      </select>
    </div>
    <div class="masters-grid" id="mastersGrid"></div>
  </div>
</section>

<section id="masterDetailPage" class="page">
  <div id="masterDetailContent" style="max-width:1200px; margin:0 auto; padding:2rem 5%;"></div>
</section>

<section id="authPage" class="page">
  <div style="max-width:450px; margin:3rem auto; padding:0 1rem;" id="authContainer"></div>
</section>

<section id="cabinetPage" class="page">
  <div id="cabinetContent" style="padding:2rem 5%; max-width:1400px; margin:0 auto;"></div>
</section>

<footer class="footer"><p>© 2025 NailMasterGo</p></footer>
<div id="modalContainer"></div>
<div id="toastContainer"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, collection, doc, addDoc, getDocs, getDoc, updateDoc, setDoc, query, where, orderBy, serverTimestamp, limit, getCountFromServer } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyBTlbTN6Sura-MUWdrAEqIaDE3VUlUCb_c",
    authDomain: "nailmastergo.firebaseapp.com",
    projectId: "nailmastergo",
    storageBucket: "nailmastergo.firebasestorage.app",
    messagingSenderId: "205974047718",
    appId: "1:205974047718:web:3b0a0b1dd89bf58dd32427"
  };

  const app = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db = getFirestore(app);

  console.log('🔥 NailMasterGo Firebase:', FIREBASE_CONFIG.projectId);

  // Глобальные переменные
  let currentUser = null;
  let userProfile = null;
  let allMasters = [];
  let currentMaster = null;
  let selectedDate = new Date().toISOString().split('T')[0];
  let selectedSlot = null;

  // Toast
  window.toast = (msg) => {
    const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  };

  // Навигация БЕЗ рекурсии
  let navigationLock = false;
  window.showPage = (name) => {
    if (navigationLock) return;
    navigationLock = true;
    
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    
    const page = document.getElementById(name + 'Page');
    if (page) page.classList.add('active');
    
    // Активируем ссылку в меню
    const navLinks = document.querySelectorAll('.nav-link');
    const pageIndex = ['home', 'masters', 'cabinet', 'auth'].indexOf(name);
    if (pageIndex >= 0 && navLinks[pageIndex]) navLinks[pageIndex].classList.add('active');
    
    window.scrollTo(0, 0);
    if (window.innerWidth <= 768) document.getElementById('navLinks').classList.remove('active');
    
    // Загружаем данные для страницы
    if (name === 'masters') loadMasters();
    if (name === 'cabinet') loadCabinet();
    if (name === 'auth') renderAuth();
    
    setTimeout(() => { navigationLock = false; }, 100);
  };

  window.toggleMenu = () => document.getElementById('navLinks').classList.toggle('active');
  window.closeModal = () => document.getElementById('modalContainer').innerHTML = '';

  // ============ АВТОСИДИРОВАНИЕ ============
  async function autoSeed() {
    console.log('🌱 Проверка данных...');
    try {
      const snap = await getDocs(query(collection(db, 'masters'), limit(1)));
      if (snap.empty) {
        console.log('📝 Сидирую мастеров...');
        const masters = [
          { name: 'Анна Петрова', specialization: 'Маникюр, педикюр, дизайн', address: 'г. Москва, ул. Тверская, 15', phone: '+7 999 123-45-67', photoURL: 'https://placehold.co/400x400/FF6B9D/white?text=Anna', priceFrom: 1500, rating: 4.9, reviewCount: 32, services: ['Маникюр','Педикюр','Дизайн ногтей','Наращивание'], description: 'Опытный мастер с 6-летним стажем.', active: true, userId: 'seed_anna', schedule: { 'ПН':{enabled:true,start:'09:00',end:'19:00'},'ВТ':{enabled:true,start:'09:00',end:'19:00'},'СР':{enabled:true,start:'09:00',end:'19:00'},'ЧТ':{enabled:true,start:'09:00',end:'19:00'},'ПТ':{enabled:true,start:'09:00',end:'17:00'},'СБ':{enabled:true,start:'10:00',end:'15:00'},'ВС':{enabled:false} }, createdAt: serverTimestamp() },
          { name: 'Елена Смирнова', specialization: 'Наращивание, дизайн', address: 'г. Москва, ул. Арбат, 25', phone: '+7 999 234-56-78', photoURL: 'https://placehold.co/400x400/6C5CE7/white?text=Elena', priceFrom: 2000, rating: 4.7, reviewCount: 18, services: ['Наращивание','Дизайн ногтей'], description: 'Специалист по наращиванию.', active: true, userId: 'seed_elena', schedule: { 'ПН':{enabled:true,start:'10:00',end:'20:00'},'ВТ':{enabled:true,start:'10:00',end:'20:00'},'СР':{enabled:true,start:'10:00',end:'20:00'},'ЧТ':{enabled:true,start:'10:00',end:'20:00'},'ПТ':{enabled:true,start:'10:00',end:'18:00'},'СБ':{enabled:false},'ВС':{enabled:false} }, createdAt: serverTimestamp() },
          { name: 'Мария Иванова', specialization: 'Педикюр, маникюр', address: 'г. Санкт-Петербург, Невский пр., 45', phone: '+7 999 345-67-89', photoURL: 'https://placehold.co/400x400/00CEC9/white?text=Maria', priceFrom: 1200, rating: 4.8, reviewCount: 45, services: ['Маникюр','Педикюр'], description: 'Мастер с мед. образованием.', active: true, userId: 'seed_maria', schedule: { 'ПН':{enabled:true,start:'08:00',end:'17:00'},'ВТ':{enabled:true,start:'08:00',end:'17:00'},'СР':{enabled:true,start:'08:00',end:'17:00'},'ЧТ':{enabled:true,start:'08:00',end:'17:00'},'ПТ':{enabled:true,start:'08:00',end:'16:00'},'СБ':{enabled:true,start:'09:00',end:'14:00'},'ВС':{enabled:true,start:'10:00',end:'14:00'} }, createdAt: serverTimestamp() }
        ];
        for (const m of masters) {
          await addDoc(collection(db, 'masters'), m);
        }
        console.log('✅ Сидирование завершено!');
        toast('✅ База готова!');
      } else {
        console.log('✅ Данные уже есть:', snap.size);
      }
    } catch(e) {
      console.error('❌ Ошибка сидирования:', e.message);
      console.log('💡 Убедись, что правила Firestore открыты для чтения/записи');
    }
  }

  // Загрузка мастеров
  async function loadMasters() {
    const grid = document.getElementById('mastersGrid');
    if (!grid) return;
    grid.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Загрузка...</p></div>';
    try {
      const snap = await getDocs(query(collection(db, 'masters'), where('active', '==', true)));
      allMasters = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      
      const search = (document.getElementById('searchMasterInput')?.value || '').toLowerCase();
      const spec = document.getElementById('filterSpec')?.value || '';
      const sort = document.getElementById('sortMasters')?.value || 'rating';
      
      let filtered = [...allMasters];
      if (search) filtered = filtered.filter(m => (m.name||'').toLowerCase().includes(search) || (m.address||'').toLowerCase().includes(search));
      if (spec) filtered = filtered.filter(m => (m.specialization||'').includes(spec) || (m.services||[]).includes(spec));
      if (sort === 'price_asc') filtered.sort((a,b) => (a.priceFrom||9999)-(b.priceFrom||9999));
      else if (sort === 'price_desc') filtered.sort((a,b) => (b.priceFrom||0)-(a.priceFrom||0));
      else filtered.sort((a,b) => (b.rating||5)-(a.rating||5));
      
      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-user-slash"></i><p>Мастеров не найдено</p></div>';
        return;
      }
      
      grid.innerHTML = filtered.map(m => `
        <div class="master-card" onclick="showMasterDetail('${m.id}')">
          <div class="master-card-img">
            ${m.photoURL ? `<img src="${m.photoURL}" alt="${m.name}" onerror="this.style.display='none'">` : '<i class="fas fa-user-circle" style="font-size:5rem;color:var(--gray)"></i>'}
            <div class="master-card-badge">★ ${(m.rating||5).toFixed(1)}</div>
          </div>
          <div class="master-card-body">
            <div class="master-card-name">${m.name}</div>
            <div class="master-card-spec">${m.specialization}</div>
            <div class="master-card-address"><i class="fas fa-map-marker-alt"></i> ${m.address||''}</div>
            <div class="master-card-services">${(m.services||[]).slice(0,3).map(s => `<span class="service-tag">${s}</span>`).join('')}</div>
            <div class="master-card-footer">
              <div class="master-card-price">от ${m.priceFrom||800} ₽</div>
              <button class="btn btn-sm" onclick="event.stopPropagation(); bookMaster('${m.id}')">Записаться</button>
            </div>
          </div>
        </div>
      `).join('');
    } catch(e) {
      grid.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Ошибка загрузки. Проверь F12</p></div>';
      console.error(e);
    }
  }

  // Детали мастера
  window.showMasterDetail = async (id) => {
    showPage('masterDetail');
    const container = document.getElementById('masterDetailContent');
    container.innerHTML = '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Загрузка...</p></div>';
    try {
      const snap = await getDoc(doc(db, 'masters', id));
      if (!snap.exists()) { container.innerHTML = '<p>Мастер не найден</p>'; return; }
      currentMaster = { id: snap.id, ...snap.data() };
      const m = currentMaster;
      
      const days = ['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];
      const dayNames = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
      const scheduleHtml = days.map((d,i) => {
        const s = m.schedule?.[d];
        return `<div class="schedule-day"><span>${dayNames[i]}</span><span style="color:${s?.enabled ? 'var(--success)' : 'var(--gray)'}">${s?.enabled ? `${s.start}-${s.end}` : 'Выходной'}</span></div>`;
      }).join('');
      
      container.innerHTML = `
        <div class="detail-grid">
          <div>
            <div style="width:100%;aspect-ratio:1;border-radius:var(--radius-lg);overflow:hidden;background:var(--card-bg);display:flex;align-items:center;justify-content:center;">
              ${m.photoURL ? `<img src="${m.photoURL}" style="width:100%;height:100%;object-fit:cover;">` : '<i class="fas fa-user-circle" style="font-size:8rem;color:var(--gray)"></i>'}
            </div>
            <div class="detail-schedule"><h4>Расписание</h4>${scheduleHtml}</div>
          </div>
          <div class="detail-info">
            <h1>${m.name}</h1>
            <div class="detail-spec">${m.specialization}</div>
            <div style="color:var(--warning);">★ ${(m.rating||5).toFixed(1)} (${m.reviewCount||0})</div>
            <div class="detail-price">от ${m.priceFrom||800} ₽</div>
            <p><i class="fas fa-map-marker-alt"></i> ${m.address}</p>
            <p style="color:var(--gray); margin:1rem 0;">${m.description||''}</p>
            <h3>Выбрать время</h3>
            <input type="date" id="bookingDate" value="${selectedDate}" min="${new Date().toISOString().split('T')[0]}" onchange="selectedDate=this.value;loadSlots('${m.id}')" style="margin:1rem 0; padding:10px; border-radius:12px; background:rgba(255,255,255,0.05); border:1px solid var(--card-border); color:white;">
            <div class="slots-container" id="slotsContainer"><p>Выберите дату</p></div>
            <button class="btn btn-block" id="confirmBtn" style="margin-top:1.5rem;display:none;" onclick="confirmBooking('${m.id}')">Подтвердить запись</button>
          </div>
        </div>
      `;
      selectedDate = document.getElementById('bookingDate').value;
      loadSlots(m.id);
    } catch(e) {
      container.innerHTML = '<p>Ошибка</p>';
      console.error(e);
    }
  };

  async function loadSlots(masterId) {
    const container = document.getElementById('slotsContainer');
    const confirmBtn = document.getElementById('confirmBtn');
    if (!container) return;
    container.innerHTML = '<p>Загрузка...</p>';
    selectedSlot = null;
    if (confirmBtn) confirmBtn.style.display = 'none';
    
    try {
      const master = currentMaster || (await getDoc(doc(db, 'masters', masterId))).data();
      const days = ['ВС','ПН','ВТ','СР','ЧТ','ПТ','СБ'];
      const dayKey = days[new Date(selectedDate).getDay()];
      const daySched = master.schedule?.[dayKey];
      
      if (!daySched?.enabled) {
        container.innerHTML = '<p style="color:var(--gray);">Выходной</p>';
        return;
      }
      
      const slots = [];
      const start = parseInt(daySched.start.split(':')[0]);
      const end = parseInt(daySched.end.split(':')[0]);
      for (let h = start; h < end; h++) {
        slots.push(`${String(h).padStart(2,'0')}:00`);
        slots.push(`${String(h).padStart(2,'0')}:30`);
      }
      
      const bookedSnap = await getDocs(query(collection(db, 'bookings'), where('masterId','==',masterId), where('date','==',selectedDate), where('status','in',['new','confirmed'])));
      const booked = bookedSnap.docs.map(d => d.data().time);
      
      container.innerHTML = slots.map(s => {
        const isBooked = booked.includes(s);
        return `<button class="slot-btn ${isBooked ? 'booked' : ''}" ${isBooked ? 'disabled' : `onclick="selectSlot('${s}', this)"`}>${s} ${isBooked ? '❌' : '✓'}</button>`;
      }).join('');
    } catch(e) {
      container.innerHTML = '<p>Ошибка</p>';
    }
  }

  window.selectSlot = (time, btn) => {
    selectedSlot = time;
    document.querySelectorAll('.slot-btn.selected').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('confirmBtn').style.display = 'flex';
  };

  window.confirmBooking = async (masterId) => {
    if (!currentUser) { toast('Войдите'); showPage('auth'); return; }
    if (!selectedSlot) { toast('Выберите время'); return; }
    try {
      await addDoc(collection(db, 'bookings'), {
        masterId, clientId: currentUser.uid,
        clientName: currentUser.displayName || userProfile?.name || 'Клиент',
        clientEmail: currentUser.email,
        date: selectedDate, time: selectedSlot,
        status: 'new', createdAt: serverTimestamp()
      });
      toast('✅ Вы записаны!');
      loadSlots(masterId);
    } catch(e) {
      toast('Ошибка: ' + e.message);
    }
  };

  window.bookMaster = (masterId) => {
    if (!currentUser) { toast('Войдите'); showPage('auth'); return; }
    showMasterDetail(masterId);
  };

  // Авторизация
  function renderAuth() {
    const container = document.getElementById('authContainer');
    if (!container || currentUser) { showPage('home'); return; }
    container.innerHTML = `
      <div style="background:var(--dark-card);padding:2.5rem;border-radius:var(--radius-lg);border:1px solid var(--card-border);">
        <h3 style="font-size:1.8rem;margin-bottom:1.5rem;text-align:center;color:var(--primary);">Вход / Регистрация</h3>
        <button class="btn btn-block" style="background:white;color:#333;margin-bottom:1rem;" onclick="signInWithGoogle()"><i class="fab fa-google"></i> Google</button>
        <div style="text-align:center;color:var(--gray);margin:1rem 0;">— или email —</div>
        <div class="form-group"><input type="email" id="authEmail" placeholder="Email"></div>
        <div class="form-group"><input type="password" id="authPass" placeholder="Пароль (мин. 6)"></div>
        <div class="form-group"><select id="authRole"><option value="client">Клиент</option><option value="master">Мастер</option></select></div>
        <button class="btn btn-block" onclick="emailAuth('login')">Войти</button>
        <button class="btn btn-outline btn-block" style="margin-top:0.5rem;" onclick="emailAuth('register')">Регистрация</button>
      </div>
    `;
  }

  window.emailAuth = async (mode) => {
    const email = document.getElementById('authEmail').value.trim();
    const pass = document.getElementById('authPass').value.trim();
    const role = document.getElementById('authRole').value;
    if (!email || !pass) { toast('Заполните поля'); return; }
    if (pass.length < 6) { toast('Пароль мин. 6'); return; }
    try {
      if (mode === 'register') {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName: email.split('@')[0] });
        await setDoc(doc(db, 'users', cred.user.uid), { email, role, name: email.split('@')[0], createdAt: serverTimestamp() });
        if (role === 'master') {
          await setDoc(doc(db, 'masters', cred.user.uid), { userId: cred.user.uid, name: email.split('@')[0], active: false, services: ['Маникюр'], priceFrom: 800, rating: 5, reviewCount: 0, schedule: {}, createdAt: serverTimestamp() });
        }
        toast('✅ Готово!');
      } else {
        await signInWithEmailAndPassword(auth, email, pass);
        toast('✅ Вход!');
      }
      showPage('home');
    } catch(e) { toast('Ошибка: ' + e.message); }
  };

  window.signInWithGoogle = async () => {
    try {
      const result = await signInWithPopup(auth, new GoogleAuthProvider());
      const user = result.user;
      if (!(await getDoc(doc(db, 'users', user.uid))).exists()) {
        await setDoc(doc(db, 'users', user.uid), { email: user.email, role: 'client', name: user.displayName, photoURL: user.photoURL, createdAt: serverTimestamp() });
      }
      toast('✅ Google вход!');
      showPage('home');
    } catch(e) { toast('Ошибка Google'); }
  };

  // Кабинет
  async function loadCabinet() {
    if (!currentUser) { toast('Войдите'); showPage('auth'); return; }
    if (!userProfile) {
      const snap = await getDoc(doc(db, 'users', currentUser.uid));
      userProfile = snap.data();
    }
    const container = document.getElementById('cabinetContent');
    if (!container) return;
    
    if (userProfile?.role === 'master') {
      const masterSnap = await getDoc(doc(db, 'masters', currentUser.uid));
      const masterData = masterSnap.exists() ? masterSnap.data() : {};
      const bookingsSnap = await getDocs(query(collection(db, 'bookings'), where('masterId','==',currentUser.uid), orderBy('createdAt','desc'), limit(50)));
      const bookings = bookingsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      
      container.innerHTML = `
        <div class="cabinet-layout">
          <div class="cabinet-sidebar">
            <h3>Кабинет</h3>
            <button class="active" onclick="switchTab('profile',this)">Профиль</button>
            <button onclick="switchTab('schedule',this)">Расписание</button>
            <button onclick="switchTab('bookings',this)">Записи (${bookings.length})</button>
          </div>
          <div class="cabinet-content" id="tabContent"></div>
        </div>
      `;
      
      window.switchTab = (tab, btn) => {
        document.querySelectorAll('.cabinet-sidebar button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tc = document.getElementById('tabContent');
        if (tab === 'profile') {
          tc.innerHTML = `
            <h3>Профиль</h3>
            <div class="form-group"><label>Имя</label><input id="mName" value="${masterData.name||''}"></div>
            <div class="form-group"><label>Специализация</label><input id="mSpec" value="${masterData.specialization||''}"></div>
            <div class="form-group"><label>Адрес</label><input id="mAddr" value="${masterData.address||''}"></div>
            <div class="form-row"><div class="form-group"><label>Цена от</label><input type="number" id="mPrice" value="${masterData.priceFrom||800}"></div><div class="form-group"><label>Телефон</label><input id="mPhone" value="${masterData.phone||''}"></div></div>
            <div class="form-group"><label>Описание</label><textarea id="mDesc">${masterData.description||''}</textarea></div>
            <div class="form-group"><label>Услуги (через запятую)</label><input id="mServ" value="${(masterData.services||['Маникюр']).join(', ')}"></div>
            <div class="form-group"><label>Фото URL</label><input id="mPhoto" value="${masterData.photoURL||''}"></div>
            <label><input type="checkbox" id="mActive" ${masterData.active?'checked':''}> Активен</label>
            <button class="btn" onclick="saveMasterProfile()" style="margin-top:1rem;">Сохранить</button>
          `;
        } else if (tab === 'schedule') {
          const sched = masterData.schedule || {};
          const days = ['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];
          const dn = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
          tc.innerHTML = `<h3>Расписание</h3>${days.map((d,i) => {
            const day = sched[d] || { enabled: false, start: '09:00', end: '18:00' };
            return `<div style="display:flex;gap:1rem;align-items:center;padding:0.8rem;background:var(--card-bg);border-radius:12px;margin-bottom:0.5rem;flex-wrap:wrap;"><label style="min-width:80px;"><input type="checkbox" class="sd" data-day="${d}" ${day.enabled?'checked':''}> ${dn[i]}</label><input type="time" class="ss" data-day="${d}" value="${day.start}" ${!day.enabled?'disabled':''}> — <input type="time" class="se" data-day="${d}" value="${day.end}" ${!day.enabled?'disabled':''}></div>`;
          }).join('')}<button class="btn" onclick="saveSchedule()">Сохранить</button>`;
          setTimeout(() => {
            document.querySelectorAll('.sd').forEach(cb => cb.addEventListener('change', function(){
              document.querySelector(`.ss[data-day="${this.dataset.day}"]`).disabled = !this.checked;
              document.querySelector(`.se[data-day="${this.dataset.day}"]`).disabled = !this.checked;
            }));
          }, 100);
        } else {
          tc.innerHTML = `<h3>Записи</h3>${bookings.length===0?'<p>Нет записей</p>':bookings.map(b => `
            <div style="background:var(--card-bg);padding:1rem;border-radius:12px;margin-bottom:0.5rem;display:flex;justify-content:space-between;align-items:center;">
              <div><strong>${b.clientName}</strong><br>📅 ${b.date} ${b.time}</div>
              <div><span class="badge badge-${b.status}">${b.status==='new'?'Новая':b.status==='confirmed'?'Ок':'Отмена'}</span>
              ${b.status==='new'?`<button class="btn btn-sm btn-success" onclick="updateBooking('${b.id}','confirmed')">✓</button><button class="btn btn-sm btn-danger" onclick="updateBooking('${b.id}','cancelled')">✕</button>`:''}</div>
            </div>
          `).join('')}`;
        }
      };
    } else {
      const bookingsSnap = await getDocs(query(collection(db, 'bookings'), where('clientId','==',currentUser.uid), orderBy('createdAt','desc'), limit(50)));
      const bookings = bookingsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      container.innerHTML = `<h2>Мои записи</h2>${bookings.length===0?'<p>Нет записей</p>':bookings.map(b => `<div style="background:var(--dark-card);padding:1rem;border-radius:12px;margin-bottom:0.5rem;"><strong>${b.clientName}</strong> — ${b.date} ${b.time} <span class="badge badge-${b.status}">${b.status}</span></div>`).join('')}`;
    }
  }

  window.saveMasterProfile = async () => {
    await setDoc(doc(db, 'masters', currentUser.uid), {
      name: document.getElementById('mName').value,
      specialization: document.getElementById('mSpec').value,
      address: document.getElementById('mAddr').value,
      priceFrom: Number(document.getElementById('mPrice').value)||800,
      phone: document.getElementById('mPhone').value,
      description: document.getElementById('mDesc').value,
      services: document.getElementById('mServ').value.split(',').map(s=>s.trim()).filter(Boolean),
      photoURL: document.getElementById('mPhoto').value,
      active: document.getElementById('mActive').checked
    }, { merge: true });
    toast('✅ Сохранено!');
  };

  window.saveSchedule = async () => {
    const days = ['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];
    const schedule = {};
    days.forEach(d => {
      schedule[d] = {
        enabled: document.querySelector(`.sd[data-day="${d}"]`)?.checked || false,
        start: document.querySelector(`.ss[data-day="${d}"]`)?.value || '09:00',
        end: document.querySelector(`.se[data-day="${d}"]`)?.value || '18:00'
      };
    });
    await updateDoc(doc(db, 'masters', currentUser.uid), { schedule });
    toast('✅ Сохранено!');
  };

  window.updateBooking = async (id, status) => {
    await updateDoc(doc(db, 'bookings', id), { status });
    toast(status==='confirmed'?'✅ Подтверждено':'❌ Отменено');
    loadCabinet();
  };

  // Auth state
  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    const authBtn = document.getElementById('authNavBtn');
    const cabBtn = document.getElementById('cabinetNavItem');
    if (user) {
      const snap = await getDoc(doc(db, 'users', user.uid));
      userProfile = snap.data();
      authBtn.innerHTML = '<i class="fas fa-user"></i> ' + (userProfile?.name || user.email?.split('@')[0]);
      authBtn.onclick = () => showPage('cabinet');
      cabBtn.style.display = 'block';
    } else {
      userProfile = null;
      authBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Войти';
      authBtn.onclick = () => showPage('auth');
      cabBtn.style.display = 'none';
    }
  });

  // Старт
  console.log('🚀 Запуск...');
  autoSeed();
</script>
</body>
</html>
